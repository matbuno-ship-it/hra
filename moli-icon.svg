<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Moli srnka - jemnejšia fialová s veľkými ušami -->
  <defs>
    <radialGradient id="mg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c4b3e8"/>
      <stop offset="100%" stop-color="#8b7bbf"/>
    </radialGradient>
  </defs>
  <!-- Telo -->
  <ellipse cx="50" cy="64" rx="25" ry="22" fill="url(#mg)"/>
  <!-- Hlava -->
  <circle cx="50" cy="40" r="20" fill="url(#mg)"/>
  <!-- Veľké srnčie uši -->
  <ellipse cx="28" cy="24" rx="10" ry="16" fill="#a593d0" transform="rotate(-15 28 24)"/>
  <ellipse cx="72" cy="24" rx="10" ry="16" fill="#a593d0" transform="rotate(15 72 24)"/>
  <ellipse cx="28" cy="23" rx="6" ry="11" fill="#d8c8f5" transform="rotate(-15 28 23)"/>
  <ellipse cx="72" cy="23" rx="6" ry="11" fill="#d8c8f5" transform="rotate(15 72 23)"/>
  <!-- Parožky (malé, srnčie) -->
  <path d="M40 18 L38 8 M38 8 L34 5 M38 8 L42 6" stroke="#8b7bbf" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M60 18 L62 8 M62 8 L66 5 M62 8 L58 6" stroke="#8b7bbf" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Oči (väčšie, jemnejšie) -->
  <ellipse cx="42" cy="38" rx="5.5" ry="6" fill="white"/>
  <ellipse cx="58" cy="38" rx="5.5" ry="6" fill="white"/>
  <circle cx="43" cy="37.5" r="3.2" fill="#3d2d79"/>
  <circle cx="59" cy="37.5" r="3.2" fill="#3d2d79"/>
  <circle cx="44" cy="36.5" r="1.3" fill="white"/>
  <circle cx="60" cy="36.5" r="1.3" fill="white"/>
  <!-- Nos -->
  <ellipse cx="50" cy="45" rx="3" ry="2" fill="#7b6baf"/>
  <!-- Úsmev -->
  <path d="M46 48 Q50 52 54 48" stroke="#7b6baf" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Biele bodky na čele -->
  <circle cx="46" cy="30" r="1.5" fill="white" opacity=".6"/>
  <circle cx="54" cy="30" r="1.5" fill="white" opacity=".6"/>
  <circle cx="50" cy="28" r="1.2" fill="white" opacity=".5"/>
  <!-- Škvrny na tele -->
  <circle cx="38" cy="58" r="2.5" fill="#8b7bbf" opacity=".35"/>
  <circle cx="60" cy="56" r="2" fill="#8b7bbf" opacity=".35"/>
  <circle cx="48" cy="72" r="2" fill="#8b7bbf" opacity=".35"/>
  <circle cx="56" cy="70" r="2.5" fill="#8b7bbf" opacity=".35"/>
  <!-- Labky -->
  <ellipse cx="40" cy="82" rx="5" ry="3.5" fill="#a593d0"/>
  <ellipse cx="60" cy="82" rx="5" ry="3.5" fill="#a593d0"/>
</svg>
