<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="sky-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbdefb"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#sky-r)"/>

  <!-- River (background, flowing through) -->
  <path d="M0,130 Q60,100 120,120 Q180,140 240,115 Q300,90 360,110 Q400,125 400,130 L400,200 L0,200 Z" fill="#1565c0" opacity=".3"/>
  <path d="M0,140 Q60,110 120,130 Q180,150 240,125 Q300,100 360,120 Q400,135 400,140 L400,200 L0,200 Z" fill="#1976d2" opacity=".4"/>

  <!-- PART 1: River bank + hoofprints -->
  <g class="map-part" data-part="0">
    <!-- Bank -->
    <path d="M0,155 Q30,148 60,152 Q90,156 100,155" stroke="#8d6e63" stroke-width="8" fill="none"/>
    <!-- Rocks -->
    <ellipse cx="20" cy="158" rx="12" ry="6" fill="#78909c"/>
    <ellipse cx="50" cy="155" rx="8" ry="5" fill="#90a4ae"/>
    <!-- Reeds -->
    <line x1="15" y1="145" x2="15" y2="125" stroke="#4caf50" stroke-width="2"/>
    <line x1="20" y1="148" x2="22" y2="120" stroke="#66bb6a" stroke-width="2"/>
    <ellipse cx="15" cy="124" rx="3" ry="5" fill="#81c784"/>
    <!-- Hoofprints -->
    <path d="M30,162 L33,158 M35,162 L38,158" stroke="#5d4037" stroke-width="1.5" fill="none"/>
    <path d="M55,160 L58,156 M60,160 L63,156" stroke="#5d4037" stroke-width="1.5" fill="none"/>
    <!-- Fish jumping -->
    <path d="M70,130 Q75,120 80,130" stroke="#42a5f5" stroke-width="2" fill="none"/>
    <circle cx="75" cy="122" r="4" fill="#64b5f6"/>
  </g>

  <!-- PART 2: Scratched rock + stepping stones -->
  <g class="map-part" data-part="1">
    <!-- Big rock with scratch -->
    <ellipse cx="140" cy="150" rx="20" ry="12" fill="#607d8b"/>
    <ellipse cx="140" cy="148" rx="18" ry="10" fill="#78909c"/>
    <line x1="132" y1="146" x2="148" y2="144" stroke="#455a64" stroke-width="2"/>
    <line x1="134" y1="150" x2="146" y2="148" stroke="#455a64" stroke-width="1.5"/>
    <!-- Stepping stones -->
    <ellipse cx="120" cy="140" rx="8" ry="5" fill="#90a4ae"/>
    <ellipse cx="138" cy="135" rx="7" ry="4" fill="#78909c"/>
    <ellipse cx="155" cy="138" rx="8" ry="5" fill="#90a4ae"/>
    <!-- Water lilies -->
    <circle cx="160" cy="128" r="6" fill="#c8e6c9"/>
    <circle cx="160" cy="128" r="3" fill="#f48fb1"/>
    <circle cx="115" cy="132" r="5" fill="#c8e6c9"/>
    <!-- Waterfall small -->
    <path d="M170,100 L170,120" stroke="rgba(255,255,255,.5)" stroke-width="4"/>
    <path d="M173,102 L173,118" stroke="rgba(255,255,255,.3)" stroke-width="2"/>
  </g>

  <!-- PART 3: Ribbon on branch + bend -->
  <g class="map-part" data-part="2">
    <!-- Tree leaning over river -->
    <path d="M220,180 Q225,140 240,120 Q250,110 260,115" stroke="#5d4037" stroke-width="5" fill="none"/>
    <circle cx="260" cy="112" r="15" fill="#388e3c"/>
    <circle cx="248" cy="108" r="10" fill="#43a047"/>
    <!-- Ribbon on branch -->
    <path d="M255,105 Q260,95 265,105 Q258,110 255,105" fill="#e91e63"/>
    <path d="M258,108 L255,118" stroke="#e91e63" stroke-width="1.5" fill="none"/>
    <path d="M262,108 L265,118" stroke="#e91e63" stroke-width="1.5" fill="none"/>
    <!-- River bend -->
    <path d="M200,135 Q230,120 260,135 Q280,145 300,130" stroke="#bbdefb" stroke-width="3" fill="none" opacity=".5"/>
    <!-- Ducks -->
    <ellipse cx="240" cy="138" rx="5" ry="3" fill="#ffd54f"/>
    <circle cx="237" cy="136" r="2.5" fill="#ffd54f"/>
  </g>

  <!-- PART 4: Mountains in distance + mark on tree -->
  <g class="map-part" data-part="3">
    <!-- Mountains in background -->
    <polygon points="300,100 340,40 380,100" fill="#78909c" opacity=".5"/>
    <polygon points="330,100 365,30 400,100" fill="#90a4ae" opacity=".4"/>
    <polygon points="350,100 380,50 400,80 400,100" fill="#607d8b" opacity=".3"/>
    <!-- Snow caps -->
    <polygon points="335,48 340,40 345,48" fill="white" opacity=".6"/>
    <polygon points="360,38 365,30 370,38" fill="white" opacity=".6"/>
    <!-- Tree with mark -->
    <rect x="310" y="130" width="8" height="40" fill="#5d4037"/>
    <circle cx="314" cy="120" r="14" fill="#388e3c"/>
    <!-- Claw mark on tree -->
    <line x1="308" y1="140" x2="312" y2="150" stroke="#ffd54f" stroke-width="2"/>
    <line x1="312" y1="140" x2="316" y2="150" stroke="#ffd54f" stroke-width="2"/>
    <line x1="316" y1="140" x2="320" y2="150" stroke="#ffd54f" stroke-width="2"/>
    <!-- Path to mountains -->
    <path d="M300,165 Q340,155 380,160 Q395,162 400,165" stroke="#8d6e63" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="8 6"/>
  </g>
</svg>
