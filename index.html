<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sárkina Hra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #3d2d79;
      --purple-mid: #6b5ba7;
      --purple-light: #e0dcf0;
      --cream: #fff6f0;
      --text: #2e455d;
      --white: #ffffff;
      --green: #4caf50;
      --red: #e57373;
      --pink: #e85d75;
      --orange: #ff9800;
    }

    body {
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      background-color: var(--cream);
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== BACKGROUND ANIMALS ===== */
    .bg-animals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-animal { position: absolute; pointer-events: none; }
    .bg-animal img { width: 100%; height: 100%; object-fit: contain; }
    .bg-animal.a1  { top: 2%;  left: 2%;   width: 120px; opacity: 0.13; animation: float1 18s ease-in-out infinite; }
    .bg-animal.a2  { top: 12%; right: 3%;  width: 100px; opacity: 0.10; animation: float2 22s ease-in-out infinite; }
    .bg-animal.a3  { top: 35%; left: 5%;   width: 140px; opacity: 0.12; animation: float3 20s ease-in-out infinite; }
    .bg-animal.a4  { top: 55%; right: 4%;  width: 110px; opacity: 0.11; animation: float1 16s ease-in-out infinite 2s; }
    .bg-animal.a5  { top: 78%; left: 8%;   width: 90px;  opacity: 0.10; animation: float2 24s ease-in-out infinite 1s; }
    .bg-animal.a6  { top: 20%; left: 45%;  width: 100px; opacity: 0.08; animation: float3 19s ease-in-out infinite 3s; }
    .bg-animal.a7  { top: 65%; right: 15%; width: 120px; opacity: 0.10; animation: float1 21s ease-in-out infinite 4s; }
    .bg-animal.a8  { top: 88%; left: 35%;  width: 95px;  opacity: 0.09; animation: float2 17s ease-in-out infinite 2s; }
    .bg-animal.a9  { top: 45%; right: 2%;  width: 105px; opacity: 0.11; animation: float3 23s ease-in-out infinite 1s; }
    .bg-animal.a10 { top: 8%;  left: 25%;  width: 85px;  opacity: 0.09; animation: float1 20s ease-in-out infinite 5s; }
    .bg-animal.a11 { top: 30%; right: 20%; width: 110px; opacity: 0.08; animation: float2 25s ease-in-out infinite 2s; }
    .bg-animal.a12 { top: 72%; left: 55%;  width: 100px; opacity: 0.10; animation: float3 18s ease-in-out infinite 4s; }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(20px, -30px) rotate(5deg); }
      50% { transform: translate(-15px, -50px) rotate(-3deg); }
      75% { transform: translate(25px, -20px) rotate(4deg); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(-30px, -25px) rotate(-6deg); }
      66% { transform: translate(20px, -45px) rotate(4deg); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(15px, -35px) scale(1.08); }
    }

    /* ===== CONFETTI CANVAS ===== */
    #confettiCanvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 100;
    }

    /* ===== LAYOUT ===== */
    .app-wrap { position: relative; z-index: 1; min-height: 100dvh; display: flex; flex-direction: column; }

    /* ===== NAVBAR ===== */
    nav { display: flex; align-items: center; justify-content: center; padding: 18px 24px; gap: 24px; }
    .nav-logo { font-size: 30px; font-weight: 900; color: var(--purple); letter-spacing: -0.02em; font-style: italic; }
    .nav-score-wrap {
      display: flex; align-items: center; gap: 8px;
      background: var(--purple-light); padding: 8px 18px; border-radius: 100px;
      font-weight: 700; font-size: 16px; color: var(--purple);
    }
    .nav-streak {
      display: flex; align-items: center; gap: 4px;
      background: linear-gradient(135deg, #ff9800, #ff5722); color: white;
      padding: 6px 14px; border-radius: 100px; font-weight: 800; font-size: 14px;
    }

    /* ===== SCREENS ===== */
    .screen { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    .screen.active { display: flex; }

    /* ===== MASCOT + SPEECH BUBBLE (Duolingo style) ===== */
    .mascot-chat {
      display: flex; align-items: flex-end; gap: 12px; margin-bottom: 20px;
      max-width: 420px; width: 100%;
    }
    .mascot-chat.right { flex-direction: row-reverse; }
    .mascot-chat .mascot-img {
      width: 120px; height: auto; flex-shrink: 0;
      filter: drop-shadow(0 6px 16px rgba(61, 45, 121, 0.15));
      transition: transform 0.3s ease;
    }
    .mascot-chat .mascot-img.breathe { animation: breathe 3s ease-in-out infinite; }
    .mascot-chat .mascot-img.happy { animation: jump 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .mascot-chat .mascot-img.sad { animation: shake 0.4s ease-in-out; }

    .speech-bubble {
      background: var(--white); border: 3px solid var(--purple-light); border-radius: 20px;
      padding: 16px 20px; font-size: 18px; font-weight: 700; color: var(--text);
      position: relative; line-height: 1.4; text-align: left;
      box-shadow: 0 2px 8px rgba(61,45,121,0.06);
      animation: bubblePop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .speech-bubble::after {
      content: ''; position: absolute; bottom: 18px; left: -12px;
      width: 0; height: 0;
      border-top: 10px solid transparent; border-bottom: 10px solid transparent;
      border-right: 12px solid var(--white);
      filter: drop-shadow(-2px 0 0 var(--purple-light));
    }
    .mascot-chat.right .speech-bubble::after {
      left: auto; right: -12px;
      border-right: none; border-left: 12px solid var(--white);
      filter: drop-shadow(2px 0 0 var(--purple-light));
    }
    .speech-bubble .mascot-name {
      font-size: 13px; font-weight: 800; color: var(--purple); text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 4px; display: block;
    }

    @keyframes bubblePop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes jump { 0% { transform: translateY(0) rotate(0); } 40% { transform: translateY(-30px) rotate(-5deg); } 70% { transform: translateY(-10px) rotate(3deg); } 100% { transform: translateY(0) rotate(0); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }

    /* Game mascot (smaller, inline) */
    .game-mascot-row {
      display: flex; align-items: flex-end; gap: 10px; justify-content: center; margin: 12px 0 4px;
    }
    .game-mascot-row .mascot-img { width: 70px; height: auto; filter: drop-shadow(0 4px 8px rgba(61,45,121,0.1)); }
    .game-mascot-row .speech-bubble { font-size: 15px; padding: 10px 14px; border-radius: 14px; }
    .game-mascot-row .speech-bubble::after { bottom: 12px; }
    .game-mascot-row .speech-bubble .mascot-name { font-size: 11px; }

    /* ===== WELCOME SCREEN ===== */
    .welcome h1 { font-size: 52px; font-weight: 900; color: var(--purple); letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 12px; }
    .welcome p { font-size: 22px; line-height: 1.6; max-width: 500px; margin-bottom: 24px; }
    .welcome-stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; justify-content: center; }
    .stat-badge {
      background: var(--white); border-radius: 16px; padding: 12px 20px;
      box-shadow: 0 2px 8px rgba(61,45,121,0.06); text-align: center; min-width: 90px;
    }
    .stat-badge .val { font-size: 28px; font-weight: 900; color: var(--purple); }
    .stat-badge .lbl { font-size: 12px; color: var(--purple-mid); font-weight: 600; }
    .sticker-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; font-size: 28px; }

    .btn { border: none; border-radius: 100px; font-family: 'Nunito', sans-serif; font-weight: 800; cursor: pointer; transition: transform 0.2s ease; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .btn:hover { transform: scale(1.03); }
    .btn:active { transform: scale(0.97); }
    .btn:focus-visible { outline: 3px solid var(--purple-light); outline-offset: 3px; }
    .btn-big { background: var(--purple); color: var(--white); padding: 18px 48px; font-size: 22px; }
    .btn-medium { background: var(--purple); color: var(--white); padding: 14px 32px; font-size: 18px; }

    /* ===== GAME SCREEN ===== */
    .game-area { display: flex; align-items: flex-start; gap: 20px; width: 100%; max-width: 800px; justify-content: center; }
    .game-card {
      background: var(--white); border-radius: 32px; padding: 36px 28px; width: 100%; max-width: 700px;
      box-shadow: 0 4px 12px rgba(61,45,121,0.06), 0 16px 48px rgba(61,45,121,0.04); text-align: center;
    }
    .game-type-label { display: inline-block; background: var(--purple-light); color: var(--purple); font-size: 14px; font-weight: 700; padding: 6px 16px; border-radius: 100px; margin-bottom: 16px; }
    .game-title { font-size: 26px; font-weight: 800; color: var(--purple); margin-bottom: 8px; }
    .game-instruction { font-size: 18px; color: var(--text); margin-bottom: 24px; line-height: 1.5; }

    /* Picture */
    .picture-display { font-size: 110px; margin-bottom: 20px; min-height: 120px; line-height: 1; }

    /* Typing */
    .typing-wrap { position: relative; cursor: text; margin-bottom: 16px; }
    .typing-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; font-size: 48px; border: none; background: none; -webkit-appearance: none; touch-action: manipulation; z-index: 2; }
    .typing-display { font-size: 44px; font-weight: 800; color: var(--purple); letter-spacing: 0.12em; min-height: 56px; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .typing-display .char { display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 58px; border-bottom: 4px solid var(--purple-light); transition: border-color 0.15s ease; }
    .typing-display .char.filled { border-color: var(--purple); }
    .typing-display .char.cursor { border-color: var(--pink); animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { border-color: transparent; } }

    /* Math */
    .math-display { font-size: 52px; font-weight: 800; color: var(--purple); margin-bottom: 24px; min-height: 66px; letter-spacing: 0.05em; }
    .math-display .blank { display: inline-flex; align-items: center; justify-content: center; min-width: 60px; height: 66px; border-bottom: 5px solid var(--pink); color: var(--pink); margin: 0 4px; }
    .math-options { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 16px; }
    .math-opt-btn {
      width: 76px; height: 76px; border-radius: 20px; border: 3px solid var(--purple-light); background: var(--white);
      font-family: 'Nunito', sans-serif; font-size: 30px; font-weight: 800; color: var(--purple); cursor: pointer;
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.15s ease, border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .math-opt-btn:hover { transform: scale(1.08); border-color: var(--purple); background: var(--purple-light); }
    .math-opt-btn:active { transform: scale(0.95); }
    .math-opt-btn.correct { background: #c8f7c5; border-color: var(--green); color: #2e7d32; }
    .math-opt-btn.wrong { background: #fdd; border-color: var(--red); color: #c62828; opacity: 0.6; }

    /* Compare */
    .compare-display { font-size: 56px; font-weight: 800; color: var(--purple); margin-bottom: 24px; }
    .compare-display .circle { display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 60px; border-radius: 50%; border: 4px solid var(--pink); color: var(--pink); margin: 0 8px; font-size: 36px; }
    .compare-options { display: flex; gap: 16px; justify-content: center; margin-bottom: 16px; }
    .compare-btn {
      width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--purple-light); background: var(--white);
      font-size: 36px; font-weight: 800; color: var(--purple); cursor: pointer;
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.15s ease;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .compare-btn:hover { transform: scale(1.1); background: var(--purple-light); }
    .compare-btn:active { transform: scale(0.95); }
    .compare-btn.correct { background: #c8f7c5; border-color: var(--green); }
    .compare-btn.wrong { background: #fdd; border-color: var(--red); opacity: 0.6; }

    /* True/False */
    .tf-display { font-size: 90px; margin-bottom: 12px; line-height: 1; }
    .tf-word { font-size: 36px; font-weight: 800; color: var(--purple); margin-bottom: 24px; }
    .tf-options { display: flex; gap: 20px; justify-content: center; margin-bottom: 16px; }
    .tf-btn {
      width: 100px; height: 80px; border-radius: 20px; border: 3px solid var(--purple-light); background: var(--white);
      font-size: 40px; cursor: pointer; transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.15s ease;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .tf-btn:hover { transform: scale(1.08); }
    .tf-btn:active { transform: scale(0.95); }
    .tf-btn.correct { background: #c8f7c5; border-color: var(--green); }
    .tf-btn.wrong { background: #fdd; border-color: var(--red); opacity: 0.6; }

    /* Syllables */
    .syl-emoji { font-size: 80px; margin-bottom: 12px; line-height: 1; }
    .syl-target { font-size: 36px; font-weight: 800; color: var(--purple); margin-bottom: 20px; min-height: 44px; letter-spacing: 0.05em; }
    .syl-options { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 16px; }
    .syl-btn {
      padding: 14px 24px; border-radius: 16px; border: 3px solid var(--purple-light); background: var(--white);
      font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 800; color: var(--purple); cursor: pointer;
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .syl-btn:hover { transform: scale(1.06); border-color: var(--purple); }
    .syl-btn:active { transform: scale(0.95); }
    .syl-btn.used { opacity: 0.3; pointer-events: none; }
    .syl-btn.wrong-flash { background: #fdd; border-color: var(--red); }

    /* Match */
    .match-grid { display: grid; grid-template-columns: auto auto; gap: 12px; justify-content: center; align-items: center; margin-bottom: 16px; }
    .match-item {
      padding: 12px 20px; border-radius: 16px; border: 3px solid var(--purple-light); background: var(--white);
      font-size: 20px; font-weight: 700; color: var(--purple); cursor: pointer; text-align: center; min-width: 100px;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, opacity 0.2s ease;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .match-item.emoji { font-size: 48px; padding: 8px 16px; }
    .match-item:hover { transform: scale(1.04); }
    .match-item.selected { border-color: var(--purple); background: var(--purple-light); }
    .match-item.matched { border-color: var(--green); background: #c8f7c5; opacity: 0.6; pointer-events: none; }

    /* Speaker */
    .speaker-btn {
      width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--purple-light); background: var(--white);
      font-size: 48px; cursor: pointer; margin-bottom: 20px;
      transition: transform 0.2s ease, border-color 0.2s ease; -webkit-tap-highlight-color: transparent;
    }
    .speaker-btn:hover { transform: scale(1.08); border-color: var(--purple); }
    .speaker-btn:active { transform: scale(0.95); }
    .speaker-btn.playing { border-color: var(--purple); animation: pulse-ring 1s ease-in-out infinite; }
    @keyframes pulse-ring { 0%, 100% { box-shadow: 0 0 0 0 rgba(61,45,121,0.2); } 50% { box-shadow: 0 0 0 16px rgba(61,45,121,0); } }

    /* Feedback & controls */
    .feedback { font-size: 24px; font-weight: 800; min-height: 40px; margin: 12px 0; }
    .feedback.success { color: var(--green); }
    .feedback.error { color: var(--red); }
    .btn-skip { background: none; border: 2px solid var(--purple-light); color: var(--purple-mid); padding: 10px 24px; border-radius: 100px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .btn-skip:hover { opacity: 0.7; }

    /* Progress */
    .progress-wrap { width: 100%; max-width: 700px; margin-bottom: 16px; }
    .progress-bar { width: 100%; height: 10px; background: var(--purple-light); border-radius: 100px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--purple); border-radius: 100px; transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .progress-text { font-size: 14px; font-weight: 700; color: var(--purple-mid); margin-top: 4px; text-align: right; }

    /* Result */
    .result p { font-size: 20px; margin-bottom: 16px; }
    .result .stars { font-size: 48px; margin-bottom: 16px; letter-spacing: 8px; }
    .new-sticker { font-size: 18px; margin-bottom: 20px; color: var(--purple); }
    .new-sticker span { font-size: 48px; display: block; margin-top: 8px; animation: jump 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

    footer { text-align: center; padding: 16px; font-size: 13px; color: var(--text); opacity: 0.4; position: relative; z-index: 1; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .welcome h1 { font-size: 36px; }
      .welcome p { font-size: 18px; }
      .picture-display { font-size: 80px; min-height: 90px; }
      .typing-display { font-size: 32px; }
      .typing-display .char { width: 36px; height: 44px; }
      .math-display { font-size: 40px; }
      .math-opt-btn { width: 64px; height: 64px; font-size: 26px; }
      .game-card { padding: 24px 16px; }
      .speaker-btn { width: 76px; height: 76px; font-size: 38px; }
      nav { gap: 12px; padding: 12px 16px; }
      .nav-logo { font-size: 22px; }
      .mascot-img { width: 100px; }
      .tf-display { font-size: 70px; }
      .tf-word { font-size: 28px; }
      .compare-display { font-size: 44px; }
      .syl-emoji { font-size: 60px; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      nav { padding: 4px 12px; gap: 8px; }
      .nav-logo { font-size: 18px; }
      .screen { padding: 6px 12px; justify-content: flex-start; }
      .mascot-wrap { display: none; }
      .game-card { padding: 10px 14px; border-radius: 16px; }
      .game-type-label { font-size: 11px; padding: 3px 10px; margin-bottom: 4px; }
      .game-title { font-size: 16px; margin-bottom: 2px; }
      .game-instruction { font-size: 13px; margin-bottom: 8px; }
      .picture-display { font-size: 50px; min-height: 55px; margin-bottom: 6px; }
      .typing-display { font-size: 24px; min-height: 30px; }
      .typing-display .char { width: 26px; height: 32px; }
      .math-display { font-size: 32px; min-height: 40px; margin-bottom: 8px; }
      .math-opt-btn { width: 50px; height: 50px; font-size: 22px; }
      .speaker-btn { width: 50px; height: 50px; font-size: 26px; margin-bottom: 6px; }
      .feedback { font-size: 16px; min-height: 20px; margin: 4px 0; }
      .progress-wrap { margin-bottom: 4px; }
      .progress-bar { height: 5px; }
      footer { display: none; }
    }
  </style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<div class="bg-animals">
  <div class="bg-animal a1"><img src="1.png" alt=""></div>
  <div class="bg-animal a2"><img src="2.png" alt=""></div>
  <div class="bg-animal a3"><img src="3.png" alt=""></div>
  <div class="bg-animal a4"><img src="1.png" alt="" style="transform: scaleX(-1);"></div>
  <div class="bg-animal a5"><img src="2.png" alt="" style="transform: scaleX(-1);"></div>
  <div class="bg-animal a6"><img src="3.png" alt="" style="transform: scaleX(-1);"></div>
  <div class="bg-animal a7"><img src="1.png" alt=""></div>
  <div class="bg-animal a8"><img src="3.png" alt=""></div>
  <div class="bg-animal a9"><img src="2.png" alt=""></div>
  <div class="bg-animal a10"><img src="1.png" alt="" style="transform: scaleX(-1);"></div>
  <div class="bg-animal a11"><img src="2.png" alt=""></div>
  <div class="bg-animal a12"><img src="3.png" alt="" style="transform: scaleX(-1);"></div>
</div>

<div class="app-wrap">
  <nav>
    <span class="nav-logo">Sárkina Hra</span>
    <div class="nav-streak" id="navStreak" style="display:none;"></div>
    <div class="nav-score-wrap" id="navScore" style="display:none;">&#11088; <span id="totalScore">0</span></div>
  </nav>

  <!-- WELCOME -->
  <div class="screen welcome active" id="welcomeScreen">
    <div class="mascot-chat" id="welcomeChat">
      <img src="2.png" alt="Lili" class="mascot-img breathe">
      <div class="speech-bubble" id="welcomeBubble">

function updateStreak(data) {
  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (data.streak.lastDate === today) return; // already played today
  if (data.streak.lastDate === yesterday) data.streak.count++;
  else data.streak.count = 1;
  data.streak.lastDate = today;
}

function addSticker(data) {

  const sticker = pool[Math.floor(Math.random() * pool.length)];
  if (!data.stickers.includes(sticker)) data.stickers.push(sticker);
  return sticker;
}

let audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }

function playSound(type) {
  try {
    const ctx = getAudio();
    if (ctx.state === 'suspended') ctx.resume();
    if (type === 'correct') {
      [523.25, 659.25, 783.99].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0.15, ctx.currentTime + i*0.12);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.3);
        o.connect(g); g.connect(ctx.destination);
        o.start(ctx.currentTime + i*0.12); o.stop(ctx.currentTime + i*0.12 + 0.3);
      });
    } else if (type === 'wrong') {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = 200;
      o.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2);
      g.gain.setValueAtTime(0.12, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.25);
    } else if (type === 'click') {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = 800;
      g.gain.setValueAtTime(0.06, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.06);
    } else if (type === 'win') {
      [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'triangle'; o.frequency.value = f;
        g.gain.setValueAtTime(0.15, ctx.currentTime + i*0.15);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.15 + 0.4);
        o.connect(g); g.connect(ctx.destination);
        o.start(ctx.currentTime + i*0.15); o.stop(ctx.currentTime + i*0.15 + 0.4);
      });
    }
  } catch(e) {}
}

const confCanvas = $('confettiCanvas');
const confCtx = confCanvas.getContext('2d');
let confParticles = [], confAnim = null;

function launchConfetti() {
  confCanvas.width = window.innerWidth;
  confCanvas.height = window.innerHeight;
  confParticles = [];
  const colors = ['#3d2d79','#e0dcf0','#ff9800','#4caf50','#e85d75','#ffd700'];
  for (let i = 0; i < 80; i++) {
    confParticles.push({
      x: Math.random() * confCanvas.width,
      y: -10 - Math.random() * 100,
      w: randInt(6, 12), h: randInt(4, 8),
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: randInt(3, 7),
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 10,
    });
  }
  if (confAnim) cancelAnimationFrame(confAnim);
  animateConfetti();
  setTimeout(() => { cancelAnimationFrame(confAnim); confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); }, 2000);
}

function animateConfetti() {
  confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
  confParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.rot += p.rotV; p.vy += 0.1;
    confCtx.save();
    confCtx.translate(p.x, p.y);
    confCtx.rotate(p.rot * Math.PI / 180);
    confCtx.fillStyle = p.color;
    confCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    confCtx.restore();
  });
  confAnim = requestAnimationFrame(animateConfetti);
}

// TTS – Google Translate (prirodzený hlas) + fallback Web Speech
// ============================================================
let skVoice = null;
function initVoices() {
  if (!('speechSynthesis' in window)) return;
  const v = speechSynthesis.getVoices();
  skVoice = v.find(x=>x.lang==='sk-SK'&&x.name.includes('Microsoft')) || v.find(x=>x.lang==='sk-SK'&&x.name.includes('Google'))
    || v.find(x=>x.lang==='sk-SK') || v.find(x=>x.lang.startsWith('sk')) || v.find(x=>x.lang==='cs-CZ') || v.find(x=>x.lang.startsWith('cs')) || null;
}
if ('speechSynthesis' in window) { initVoices(); speechSynthesis.onvoiceschanged = initVoices; }

function speakFallback(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const btn = $('speakerBtn'); btn.classList.add('playing');
  function mk(rate) {
    const u = new SpeechSynthesisUtterance(text.toLowerCase());
    if (skVoice) { u.voice = skVoice; u.lang = skVoice.lang; } else u.lang = 'sk-SK';
    u.rate = rate; u.pitch = 1.05; return u;
  }
  const u1 = mk(0.65);
  u1.onend = () => setTimeout(() => { const u2 = mk(0.5); u2.onend = () => btn.classList.remove('playing'); u2.onerror = () => btn.classList.remove('playing'); speechSynthesis.speak(u2); }, 700);
  u1.onerror = () => btn.classList.remove('playing');
  speechSynthesis.speak(u1);
}

function speak(text) {
  const word = text.toLowerCase();
  const btn = $('speakerBtn');
  btn.classList.add('playing');

  // Google Translate TTS – natural voice
  const url = 'https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=sk&client=gtx&q=' + encodeURIComponent(word);

  const audio = new Audio();
  audio.crossOrigin = 'anonymous';

  audio.oncanplaythrough = () => {
    audio.play().catch(() => { speakFallback(text); });
  };

  audio.onended = () => {
    // Play again slower (by re-fetching, can't change playbackRate reliably on all browsers)
    setTimeout(() => {
      const audio2 = new Audio();
      audio2.crossOrigin = 'anonymous';
      audio2.src = url;
      audio2.onended = () => btn.classList.remove('playing');
      audio2.onerror = () => btn.classList.remove('playing');
      audio2.play().catch(() => btn.classList.remove('playing'));
    }, 600);
  };

  audio.onerror = () => {
    // Fallback to Web Speech API
    speakFallback(text);
  };

  audio.src = url;
}

// ============================================================
function generateRounds() {
  const rounds = [];
  const types = ['picture','math','dictation','syllable','match','trueFalse','compare'];
  // Distribute: ensure variety
  const pool = [];
  for (let i = 0; i < ROUNDS_PER_GAME; i++) pool.push(types[i % types.length]);
  const ordered = [types[0], ...shuffle(pool.slice(1))];

  const picWords = pick(PICTURE_WORDS, 6);
  const dictWords = pick(DICTATION_WORDS, 6);
  const sylWords = pick(SYLLABLE_WORDS, 4);
  let picIdx=0, dictIdx=0, sylIdx=0;

  for (let i = 0; i < ROUNDS_PER_GAME; i++) {
    const type = ordered[i];
    if (type === 'picture') rounds.push({ type, data: picWords[picIdx++ % picWords.length] });
    else if (type === 'math') rounds.push({ type, data: genMath() });
    else if (type === 'dictation') rounds.push({ type, data: { word: dictWords[dictIdx++ % dictWords.length] } });
    else if (type === 'syllable') rounds.push({ type, data: sylWords[sylIdx++ % sylWords.length] });
    else if (type === 'match') rounds.push({ type, data: genMatch() });
    else if (type === 'trueFalse') rounds.push({ type, data: genTF() });
    else if (type === 'compare') rounds.push({ type, data: genCompare() });
  }
  return rounds;
}

function genMath() {
  const t = randInt(0,4); let a,b,result,display,answer;
  switch(t) {
    case 0: a=randInt(0,9);b=randInt(0,10-a);answer=a+b; display=`${a} + ${b} = <span class="blank">?</span>`; break;
    case 1: a=randInt(1,10);b=randInt(0,a);answer=a-b; display=`${a} &minus; ${b} = <span class="blank">?</span>`; break;
    case 2: result=randInt(1,10);b=randInt(0,result);answer=result-b; display=`<span class="blank">?</span> + ${b} = ${result}`; break;
    case 3: result=randInt(1,10);a=randInt(0,result);answer=result-a; display=`${a} + <span class="blank">?</span> = ${result}`; break;
    case 4: a=randInt(1,10);result=randInt(0,a);answer=a-result; display=`${a} &minus; <span class="blank">?</span> = ${result}`; break;
  }
  const opts = new Set([answer]);
  while(opts.size<4){let w=answer+randInt(-3,3);if(w<0||w>10)w=randInt(0,10);opts.add(w);}
  return { display, answer, options: shuffle([...opts]) };
}

function genMatch() {
  const items = pick(PICTURE_WORDS, 3);
  return { pairs: items.map(i => ({ emoji: i.emoji, word: i.word })) };
}

function genTF() {
  const item = PICTURE_WORDS[randInt(0, PICTURE_WORDS.length - 1)];
  const isCorrect = Math.random() > 0.4;
  let shownWord = item.word;
  if (!isCorrect) {
    let other;
    do { other = PICTURE_WORDS[randInt(0, PICTURE_WORDS.length - 1)]; } while (other.word === item.word);
    shownWord = other.word;
  }
  return { emoji: item.emoji, word: shownWord, correct: isCorrect };
}

function genCompare() {
  const a = randInt(0, 10), b = randInt(0, 10);
  const answer = a > b ? '>' : a < b ? '<' : '=';
  return { a, b, answer };
}

// ============================================================
// TYPING
// ============================================================
function setupInput(inputId, displayId) {
  const input = $(inputId); activeInput = input;
  input.value = ''; input.maxLength = targetWord.length;
  let attempts = 0;
  input.oninput = () => {
    if (answered) return;
    typedChars = [...input.value.toUpperCase()].slice(0, targetWord.length);
    input.value = typedChars.join('');
    updateTypingDisplay(displayId, targetWord, typedChars);
    if (typedChars.length === targetWord.length) {
      if (typedChars.join('') === targetWord) { onCorrect(); input.blur(); }
      else {
        attempts++;
        if (attempts >= 2) { onWrongFinal(); }
        else { onWrongFeedback(); setTimeout(() => { if(!answered){typedChars=[];input.value='';updateTypingDisplay(displayId,targetWord,typedChars);$('feedback').textContent='';$('feedback').className='feedback';input.focus();}},1200); }
      }
    }
  };
  input.focus();
}

function updateTypingDisplay(displayId, word, typed) {
  const c = $(displayId); c.innerHTML = '';
  for (let i = 0; i < word.length; i++) {
    const s = document.createElement('span'); s.className = 'char';
    if (i < typed.length) { s.textContent = typed[i]; s.classList.add('filled'); }
    else if (i === typed.length) s.classList.add('cursor');
    c.appendChild(s);
  }
}

document.addEventListener('click', e => { if (e.target.closest('.typing-wrap') && activeInput && !answered) activeInput.focus(); });

// ============================================================
// GAME LOGIC
// ============================================================
function startGame() {
  totalScore = 0; roundIndex = 0;
  wrongRounds = []; retryMode = false;
  $('totalScore').textContent = '0';
  $('navScore').style.display = 'flex';
  roundsData = generateRounds();
  showScreen('gameScreen');
  loadRound();
}

function loadRound() {
  answered = false; typedChars = [];
  currentRound = roundsData[roundIndex];
  const total = roundsData.length;
  $('progressFill').style.width = ((roundIndex / total) * 100) + '%';
  $('progressText').textContent = retryMode
    ? `Opakujem ${roundIndex - ROUNDS_PER_GAME + 1} / ${total - ROUNDS_PER_GAME}`
    : `${roundIndex + 1} / ${ROUNDS_PER_GAME}`;
  ['pictureContent','mathContent','dictationContent','syllableContent','matchContent','tfContent','compareContent'].forEach(id => $(id).style.display = 'none');
  $('feedback').textContent = ''; $('feedback').className = 'feedback';
  $('nextBtn').style.display = 'none'; $('skipBtn').style.display = 'inline-block';
  mascotReact('breathe');

  const loaders = { picture: loadPicture, math: loadMath, dictation: loadDictation, syllable: loadSyllable, match: loadMatch, trueFalse: loadTF, compare: loadCompare };
  loaders[currentRound.type]();
}

function loadPicture() {
  $('gameTypeLabel').textContent = '\u{1F5BC} Obrázok';
  $('gameTitle').textContent = 'Čo je na obrázku?';
  $('gameInstruction').textContent = 'Napíš slovo.';
  $('pictureEmoji').textContent = currentRound.data.emoji;
  $('pictureContent').style.display = 'block';
  targetWord = currentRound.data.word; typedChars = [];
  updateTypingDisplay('typingDisplay', targetWord, typedChars);
  setupInput('picInput', 'typingDisplay');
}

function loadMath() {
  $('gameTypeLabel').textContent = '\u{1F522} Matematika';
  $('gameTitle').textContent = 'Vypočítaj!';
  $('gameInstruction').textContent = 'Vyber správne číslo.';
  $('mathDisplay').innerHTML = currentRound.data.display;
  $('mathContent').style.display = 'block';
  let mathAttempts = 0;
  const c = $('mathOptions'); c.innerHTML = '';
  currentRound.data.options.forEach(opt => {
    const btn = document.createElement('button'); btn.className = 'math-opt-btn'; btn.textContent = opt;
    btn.addEventListener('click', () => {
      playSound('click'); if(answered)return;
      if(opt===currentRound.data.answer){btn.classList.add('correct');onCorrect();}
      else{ btn.classList.add('wrong');btn.disabled=true;mathAttempts++;
        if(mathAttempts>=2) onWrongFinal(); else onWrongFeedback();
      }
    });
    c.appendChild(btn);
  });
}

function loadDictation() {
  $('gameTypeLabel').textContent = '\u{1F509} Diktát';
  $('gameTitle').textContent = 'Napíš, čo počuješ';
  $('gameInstruction').textContent = 'Stlač reproduktor a napíš slovo.';
  $('dictationHint').textContent = `Nápoveda: ${currentRound.data.word.length} písmen`;
  $('dictationContent').style.display = 'block';
  targetWord = currentRound.data.word; typedChars = [];
  updateTypingDisplay('dictTypingDisplay', targetWord, typedChars);
  setupInput('dictInput', 'dictTypingDisplay');
  setTimeout(() => speak(currentRound.data.word), 500);
}

function loadSyllable() {
  const d = currentRound.data;
  $('gameTypeLabel').textContent = '\u{1F9E9} Slabiky';
  $('gameTitle').textContent = 'Poskladaj slovo!';
  $('gameInstruction').textContent = 'Ťukaj na slabiky v správnom poradí.';
  $('sylEmoji').textContent = d.emoji;
  $('sylTarget').textContent = '_'.repeat(d.word.length);
  $('syllableContent').style.display = 'block';

  let built = [], sylErrors = 0;
  const extra = pick(SYLLABLE_WORDS.filter(w => w.word !== d.word), 1).flatMap(w => w.syllables.slice(0,1));
  const allSyls = shuffle([...d.syllables, ...extra]);

  const c = $('sylOptions'); c.innerHTML = '';
  allSyls.forEach(syl => {
    const btn = document.createElement('button'); btn.className = 'syl-btn'; btn.textContent = syl;
    btn.addEventListener('click', () => {
      playSound('click');
      if (answered) return;
      if (syl === d.syllables[built.length]) {
        built.push(syl); btn.classList.add('used');
        $('sylTarget').textContent = built.join('') + '_'.repeat(d.word.length - built.join('').length);
        if (built.length === d.syllables.length) onCorrect();
      } else {
        btn.classList.add('wrong-flash');
        sylErrors++;
        if (sylErrors >= 2) onWrongFinal();
        else onWrongFeedback();
        setTimeout(() => btn.classList.remove('wrong-flash'), 500);
      }
    });
    c.appendChild(btn);
  });
}

function loadMatch() {
  $('gameTypeLabel').textContent = '\u{1F517} Spájanie';
  $('gameTitle').textContent = 'Spoj obrázok so slovom';
  $('gameInstruction').textContent = 'Ťukni na obrázok, potom na slovo.';
  $('matchContent').style.display = 'block';

  const pairs = currentRound.data.pairs;
  const emojis = shuffle([...pairs]);
  const words = shuffle([...pairs]);
  let selected = null, matched = 0;

  const grid = $('matchGrid'); grid.innerHTML = '';
  emojis.forEach((p, i) => {
    const el = document.createElement('div'); el.className = 'match-item emoji'; el.textContent = p.emoji;
    el.dataset.word = p.word; el.dataset.type = 'emoji'; el.dataset.idx = i;
    el.addEventListener('click', () => handleMatchClick(el));
    grid.appendChild(el);

    const wEl = document.createElement('div'); wEl.className = 'match-item'; wEl.textContent = words[i].word;
    wEl.dataset.word = words[i].word; wEl.dataset.type = 'word'; wEl.dataset.idx = i;
    wEl.addEventListener('click', () => handleMatchClick(wEl));
    grid.appendChild(wEl);
  });

  function handleMatchClick(el) {
    if (answered || el.classList.contains('matched')) return;
    playSound('click');
    if (!selected) {
      selected = el; el.classList.add('selected');
    } else {
      if (selected.dataset.type === el.dataset.type) {
        selected.classList.remove('selected'); selected = el; el.classList.add('selected');
      } else {
        const w1 = selected.dataset.word, w2 = el.dataset.word;
        selected.classList.remove('selected');
        if (w1 === w2) {
          selected.classList.add('matched'); el.classList.add('matched');
          matched++; playSound('correct'); mascotReact('correct');
          if (matched === 3) { setTimeout(() => onCorrect(), 300); }
        } else {
          onWrongFeedback();
        }
        selected = null;
      }
    }
  }
}

function loadTF() {
  const d = currentRound.data;
  $('gameTypeLabel').textContent = '\u{2753} Pravda / Nepravda';
  $('gameTitle').textContent = 'Je to správne?';
  $('gameInstruction').textContent = 'Je toto slovo správne pre obrázok?';
  $('tfEmoji').textContent = d.emoji;
  $('tfWord').textContent = d.word;
  $('tfContent').style.display = 'block';

  const c = $('tfOptions'); c.innerHTML = '';
  [{ label: '\u{2705}', val: true }, { label: '\u{274C}', val: false }].forEach(opt => {
    const btn = document.createElement('button'); btn.className = 'tf-btn'; btn.textContent = opt.label;
    btn.addEventListener('click', () => {
      playSound('click'); if (answered) return;
      if (opt.val === d.correct) { btn.classList.add('correct'); onCorrect(); }
      else { btn.classList.add('wrong'); onWrongFinal(); }
    });
    c.appendChild(btn);
  });
}

function loadCompare() {
  const d = currentRound.data;
  $('gameTypeLabel').textContent = '\u{1F522} Porovnaj';
  $('gameTitle').textContent = 'Čo je správne?';
  $('gameInstruction').textContent = 'Vyber správny znak.';
  $('compareDisplay').innerHTML = `${d.a} <span class="circle">?</span> ${d.b}`;
  $('compareContent').style.display = 'block';

  const c = $('compareOptions'); c.innerHTML = '';
  let cmpAttempts = 0;
  ['<', '=', '>'].forEach(sign => {
    const btn = document.createElement('button'); btn.className = 'compare-btn'; btn.textContent = sign;
    btn.addEventListener('click', () => {
      playSound('click'); if (answered) return;
      if (sign === d.answer) { btn.classList.add('correct'); onCorrect(); }
      else { btn.classList.add('wrong'); btn.disabled = true; cmpAttempts++;
        if (cmpAttempts >= 1) onWrongFinal(); else onWrongFeedback();
      }
    });
    c.appendChild(btn);
  });
}

$('speakerBtn').addEventListener('click', () => { if (currentRound?.type === 'dictation') speak(currentRound.data.word); });

// ============================================================
// CORRECT / WRONG
// ============================================================
function onCorrect() {
  answered = true; totalScore++;
  $('totalScore').textContent = totalScore;
  $('feedback').textContent = '\u{1F389} Výborne, Sárka!';
  $('feedback').className = 'feedback success';
  $('nextBtn').style.display = 'inline-block'; $('skipBtn').style.display = 'none';
  if (activeInput) activeInput.blur();
  playSound('correct'); mascotReact('correct'); launchConfetti();
}

function getCorrectAnswer() {
  const r = currentRound;
  if (r.type === 'math') return r.data.answer;
  if (r.type === 'compare') return r.data.answer;
  if (r.type === 'trueFalse') return r.data.correct ? '\u{2705} Áno' : '\u{274C} Nie';
  if (r.type === 'syllable') return r.data.word;
  if (r.type === 'match') return '';
  return r.data.word || '';
}

function onWrongFinal() {
  // Show correct answer and move on (no retry in same round)
  answered = true;
  if (activeInput) activeInput.blur();
  $('skipBtn').style.display = 'none';
  const answer = getCorrectAnswer();
  if (answer) $('feedback').innerHTML = `\u{274C} Správna odpoveď: <strong>${answer}</strong>`;
  else $('feedback').textContent = '\u{274C} Chybička!';
  $('feedback').className = 'feedback error';
  $('nextBtn').style.display = 'inline-block';
  playSound('wrong'); mascotReact('wrong');
  // Save this round for retry later (only once per round)
  if (!currentRound._retried) {
    wrongRounds.push(JSON.parse(JSON.stringify(currentRound)));
  }
}

function onWrongFeedback() {
  $('feedback').textContent = '\u{274C} Skús to znova!';
  $('feedback').className = 'feedback error';
  playSound('wrong'); mascotReact('wrong');
}

$('skipBtn').addEventListener('click', () => {
  answered = true; $('skipBtn').style.display = 'none';
  if (activeInput) activeInput.blur();
  const answer = getCorrectAnswer();
  if (answer) $('feedback').innerHTML = `\u{1F4A1} Správna odpoveď: <strong>${answer}</strong>`;
  else $('feedback').textContent = '\u{1F4A1} Preskočené';
  $('feedback').className = 'feedback error';
  $('nextBtn').style.display = 'inline-block';
  // Save for retry
  if (!currentRound._retried) {
    wrongRounds.push(JSON.parse(JSON.stringify(currentRound)));
  }
});

$('nextBtn').addEventListener('click', () => {
  roundIndex++;
  if (roundIndex >= roundsData.length) {
    // Check if there are wrong rounds to retry
    if (wrongRounds.length > 0 && !retryMode) {
      retryMode = true;
      wrongRounds.forEach(r => r._retried = true);
      roundsData = roundsData.concat(wrongRounds);
      wrongRounds = [];
      // Show Lili encouraging retry
      const retryMsg = LILI_RETRY[randInt(0, LILI_RETRY.length - 1)];
      $('gameBubbleMsg').textContent = retryMsg;
      $('gameBubbleName').textContent = 'Lili';
      $('gameMascot').src = '2.png';
      $('gameBubble').style.display = 'block';
      loadRound();
    } else {
      showResult();
    }
  } else { loadRound(); if (activeInput) activeInput.focus(); }
});

function showResult() {
  showScreen('resultScreen');
  const pct = totalScore / ROUNDS_PER_GAME;
  let stars;
  if (pct===1) stars='\u{2B50}\u{2B50}\u{2B50}';
  else if (pct>=0.7) stars='\u{2B50}\u{2B50}';
  else if (pct>=0.4) stars='\u{2B50}';
  else stars='';

  // Mascot result message
  if (pct >= 0.7) {
    $('resultMascotImg').src = '2.png';
    $('resultMascotImg').className = 'mascot-img happy';
    $('resultMascotName').textContent = 'Lili';
    $('resultMascotMsg').textContent = pct === 1
      ? 'Perfektné, Sárka! Ani jedna chyba! Si úžasná!'
      : 'Skvelá práca, Sárka! To bolo super!';
  } else if (pct >= 0.4) {
    $('resultMascotImg').src = '1.png';
    $('resultMascotImg').className = 'mascot-img breathe';
    $('resultMascotName').textContent = 'Moli';
    $('resultMascotMsg').textContent = 'Dobrá práca! Nabudúce to bude ešte lepšie!';
  } else {
    $('resultMascotImg').src = '2.png';
    $('resultMascotImg').className = 'mascot-img breathe';
    $('resultMascotName').textContent = 'Lili';
    $('resultMascotMsg').textContent = 'Nevadí, Sárka! Cvičením sa všetko naučíme!';
  }
  $('resultStars').textContent = stars;
  $('resultText').textContent = `Správne: ${totalScore} z ${ROUNDS_PER_GAME}`;

  if (pct >= 0.7) playSound('win');

  // Save data
  const data = loadData();
  data.stats.gamesPlayed++;
  data.stats.totalCorrect += totalScore;
  if (totalScore > data.stats.bestScore) data.stats.bestScore = totalScore;
  updateStreak(data);
  const newSticker = addSticker(data);
  saveData(data);

  $('newSticker').innerHTML = `Nová nálepka!<span>${newSticker}</span>`;
}

// ============================================================
// WELCOME SCREEN
// ============================================================
function renderWelcome() {
  const data = loadData();

  // Streak
  const today = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  const streakActive = data.streak.lastDate === today || data.streak.lastDate === yesterday;
  if (streakActive && data.streak.count > 0) {
    $('navStreak').style.display = 'flex';
    $('navStreak').textContent = `\u{1F525} ${data.streak.count}`;
  } else {
    $('navStreak').style.display = 'none';
  }

  // Mascot messages based on history
  const played = data.stats.gamesPlayed;
  if (played === 0) {
    $('welcomeMsg').textContent = 'Ahoj Sárka! Ja som vlčica Lili. Poďme sa spolu učiť!';
    $('welcomeChat2').style.display = 'flex';
  } else if (played < 3) {
    $('welcomeMsg').textContent = 'Vitaj späť, Sárka! Rada ťa zas vidím!';
    $('welcomeChat2').style.display = 'none';
  } else if (streakActive && data.streak.count >= 3) {
    $('welcomeMsg').textContent = `Wow, ${data.streak.count} dní za sebou! Si úžasná, Sárka!`;
    $('welcomeChat2').style.display = 'none';
  } else {
    const msgs = ['Poďme na to, Sárka!', 'Dnes to dáme!', 'Čo povieš na novú hru?', 'Už sa teším, čo všetko vieš!'];
    $('welcomeMsg').textContent = msgs[randInt(0, msgs.length - 1)];
    $('welcomeChat2').style.display = 'none';
  }

  // Stats
  const stats = $('welcomeStats');
  if (played > 0) {
    stats.innerHTML = `
      <div class="stat-badge"><div class="val">${played}</div><div class="lbl">Hier</div></div>
      <div class="stat-badge"><div class="val">${data.stats.totalCorrect}</div><div class="lbl">Správnych</div></div>
      <div class="stat-badge"><div class="val">${data.stats.bestScore}/${ROUNDS_PER_GAME}</div><div class="lbl">Najlepšie</div></div>
    `;
  } else { stats.innerHTML = ''; }

  // Stickers
  const stickers = $('welcomeStickers');
  if (data.stickers.length > 0) {
    stickers.textContent = data.stickers.join(' ');
  } else { stickers.textContent = ''; }
}

// ============================================================
// INIT
// ============================================================
renderWelcome();
$('startBtn').addEventListener('click', () => { startGame(); if(activeInput) activeInput.focus(); });
$('restartBtn').addEventListener('click', () => { renderWelcome(); startGame(); if(activeInput) activeInput.focus(); });
</script>
