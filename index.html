<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sárkina Hra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--purple:#3d2d79;--purple-mid:#6b5ba7;--purple-light:#e0dcf0;--cream:#fff6f0;--text:#2e455d;--white:#fff;--green:#4caf50;--red:#e57373;--pink:#e85d75;--orange:#ff9800;--gold:#ffd700}
    body{font-family:'Nunito',sans-serif;color:var(--text);background:var(--cream);-webkit-font-smoothing:antialiased;min-height:100dvh;overflow-x:hidden}

    /* BG */
    .bg-animals{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
    .bg-animal{position:absolute;pointer-events:none}
    .bg-animal img{width:100%;height:100%;object-fit:contain}
    .bg-animal.a1{top:2%;left:2%;width:120px;opacity:.12;animation:f1 18s ease-in-out infinite}
    .bg-animal.a2{top:12%;right:3%;width:100px;opacity:.09;animation:f2 22s ease-in-out infinite}
    .bg-animal.a3{top:35%;left:5%;width:140px;opacity:.11;animation:f3 20s ease-in-out infinite}
    .bg-animal.a4{top:55%;right:4%;width:110px;opacity:.10;animation:f1 16s ease-in-out infinite 2s}
    .bg-animal.a5{top:78%;left:8%;width:90px;opacity:.09;animation:f2 24s ease-in-out infinite 1s}
    .bg-animal.a6{top:20%;left:45%;width:100px;opacity:.07;animation:f3 19s ease-in-out infinite 3s}
    @keyframes f1{0%,100%{transform:translate(0,0) rotate(0)}25%{transform:translate(20px,-30px) rotate(5deg)}50%{transform:translate(-15px,-50px) rotate(-3deg)}75%{transform:translate(25px,-20px) rotate(4deg)}}
    @keyframes f2{0%,100%{transform:translate(0,0)}33%{transform:translate(-30px,-25px) rotate(-6deg)}66%{transform:translate(20px,-45px) rotate(4deg)}}
    @keyframes f3{0%,100%{transform:scale(1)}50%{transform:translate(15px,-35px) scale(1.08)}}

    /* CONFETTI */
    #confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}

    /* LAYOUT */
    .app-wrap{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column}
    nav{display:flex;align-items:center;justify-content:center;padding:14px 20px;gap:16px}
    .nav-logo{font-size:26px;font-weight:900;color:var(--purple);font-style:italic}
    .nav-streak{display:flex;align-items:center;gap:4px;background:linear-gradient(135deg,#ff9800,#ff5722);color:white;padding:5px 12px;border-radius:100px;font-weight:800;font-size:13px}
    .nav-score-wrap{display:flex;align-items:center;gap:6px;background:var(--purple-light);padding:6px 14px;border-radius:100px;font-weight:700;font-size:14px;color:var(--purple)}

    .screen{display:none;flex:1;flex-direction:column;align-items:center;padding:16px;text-align:center}
    .screen.active{display:flex}

    /* MASCOT + BUBBLE */
    .mascot-chat{display:flex;align-items:flex-end;gap:10px;margin-bottom:16px;max-width:380px;width:100%}
    .mascot-chat.right{flex-direction:row-reverse}
    .mascot-chat .m-img{width:100px;height:auto;flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(61,45,121,.12));transition:transform .3s}
    .m-img.breathe{animation:breathe 3s ease-in-out infinite}
    .m-img.happy{animation:jump .5s cubic-bezier(.34,1.56,.64,1)}
    .m-img.sad{animation:shake .4s ease-in-out}
    .speech-bubble{background:var(--white);border:2px solid var(--purple-light);border-radius:18px;padding:12px 16px;font-size:16px;font-weight:700;color:var(--text);position:relative;line-height:1.4;text-align:left;box-shadow:0 2px 6px rgba(61,45,121,.05);animation:bpop .3s cubic-bezier(.34,1.56,.64,1)}
    .speech-bubble::after{content:'';position:absolute;bottom:16px;left:-10px;border:5px solid transparent;border-right:10px solid var(--white);filter:drop-shadow(-1px 0 0 var(--purple-light))}
    .mascot-chat.right .speech-bubble::after{left:auto;right:-10px;border-right:none;border-left:10px solid var(--white);filter:drop-shadow(1px 0 0 var(--purple-light))}
    .speech-bubble .mn{font-size:11px;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;display:block}
    @keyframes bpop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    @keyframes jump{0%{transform:translateY(0)}40%{transform:translateY(-25px) rotate(-5deg)}70%{transform:translateY(-8px) rotate(3deg)}100%{transform:translateY(0)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

    /* ===== LEVEL MAP (cestička) ===== */
    .level-map{width:100%;max-width:400px;padding:20px 0 40px;display:flex;flex-direction:column;align-items:center;gap:0}
    .level-node{position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s}
    .level-node:hover{transform:scale(1.05)}
    .level-node:active{transform:scale(.97)}
    .level-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:var(--white);position:relative;box-shadow:0 4px 12px rgba(0,0,0,.1)}
    .level-circle.done{background:var(--green)}
    .level-circle.current{background:var(--purple);animation:pulse 2s ease-in-out infinite}
    .level-circle.locked{background:#ccc;cursor:default}
    .level-circle .lock{font-size:22px}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(61,45,121,.3)}50%{box-shadow:0 0 0 12px rgba(61,45,121,0)}}
    .level-name{font-size:13px;font-weight:700;color:var(--text);margin-top:6px;max-width:120px;text-align:center}
    .level-stars{display:flex;gap:2px;margin-top:3px;font-size:16px}
    .level-stars .on{color:var(--gold)}
    .level-stars .off{color:#ddd}
    .level-line{width:3px;height:28px;background:var(--purple-light);margin:0 auto}
    .level-line.done{background:var(--green)}

    /* Chest */
    .chest-node{display:flex;flex-direction:column;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s}
    .chest-node:hover{transform:scale(1.08)}
    .chest-icon{font-size:48px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.1))}
    .chest-icon.locked{filter:grayscale(1) opacity(.4)}
    .chest-node .chest-label{font-size:12px;font-weight:700;color:var(--purple-mid);margin-top:4px}

    /* Stats row */
    .stats-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
    .stat-b{background:var(--white);border-radius:14px;padding:10px 16px;box-shadow:0 2px 6px rgba(61,45,121,.05);text-align:center;min-width:80px}
    .stat-b .v{font-size:24px;font-weight:900;color:var(--purple)}
    .stat-b .l{font-size:11px;color:var(--purple-mid);font-weight:600}
    .badge-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
    .badge-item{display:flex;flex-direction:column;align-items:center;gap:2px}
    .badge-icon{font-size:36px;width:56px;height:56px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(61,45,121,.08);border:3px solid var(--gold)}
    .badge-icon.locked{filter:grayscale(1);opacity:.3;border-color:#ccc}
    .badge-name{font-size:10px;font-weight:700;color:var(--purple-mid);max-width:70px;text-align:center}

    .btn{border:none;border-radius:100px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;transition:transform .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .btn:hover{transform:scale(1.03)}.btn:active{transform:scale(.97)}
    .btn-big{background:var(--purple);color:var(--white);padding:16px 44px;font-size:20px}
    .btn-medium{background:var(--purple);color:var(--white);padding:12px 28px;font-size:17px}

    /* ===== GAME SCREEN ===== */
    .game-card{background:var(--white);border-radius:28px;padding:28px 22px;width:100%;max-width:650px;box-shadow:0 4px 12px rgba(61,45,121,.05),0 12px 40px rgba(61,45,121,.04);text-align:center}
    .game-type-label{display:inline-block;background:var(--purple-light);color:var(--purple);font-size:13px;font-weight:700;padding:5px 14px;border-radius:100px;margin-bottom:12px}
    .game-title{font-size:22px;font-weight:800;color:var(--purple);margin-bottom:6px}
    .game-instruction{font-size:16px;color:var(--text);margin-bottom:20px;line-height:1.4}

    /* Picture */
    .picture-display{font-size:100px;margin-bottom:16px;min-height:110px;line-height:1}
    .typing-wrap{position:relative;cursor:text;margin-bottom:12px}
    .typing-input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;font-size:40px;border:none;background:none;-webkit-appearance:none;touch-action:manipulation;z-index:2}
    .typing-display{font-size:40px;font-weight:800;color:var(--purple);letter-spacing:.1em;min-height:50px;display:flex;align-items:center;justify-content:center;gap:3px}
    .typing-display .char{display:inline-flex;align-items:center;justify-content:center;width:42px;height:52px;border-bottom:3px solid var(--purple-light);transition:border-color .15s}
    .typing-display .char.filled{border-color:var(--purple)}
    .typing-display .char.cursor{border-color:var(--pink);animation:blink 1s step-end infinite}
    @keyframes blink{50%{border-color:transparent}}

    /* Math */
    .math-display{font-size:46px;font-weight:800;color:var(--purple);margin-bottom:20px;min-height:58px;letter-spacing:.04em}
    .math-display .blank{display:inline-flex;align-items:center;justify-content:center;min-width:52px;height:58px;border-bottom:4px solid var(--pink);color:var(--pink);margin:0 3px}
    .math-options{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:12px}
    .math-opt-btn{width:68px;height:68px;border-radius:18px;border:3px solid var(--purple-light);background:var(--white);font-family:'Nunito',sans-serif;font-size:28px;font-weight:800;color:var(--purple);cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1),background .15s,border-color .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .math-opt-btn:hover{transform:scale(1.06);border-color:var(--purple);background:var(--purple-light)}
    .math-opt-btn:active{transform:scale(.95)}
    .math-opt-btn.correct{background:#c8f7c5;border-color:var(--green);color:#2e7d32}
    .math-opt-btn.wrong{background:#fdd;border-color:var(--red);color:#c62828;opacity:.5}

    /* Compare */
    .compare-display{font-size:48px;font-weight:800;color:var(--purple);margin-bottom:20px}
    .compare-display .circle{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;border:3px solid var(--pink);color:var(--pink);margin:0 6px;font-size:32px}
    .compare-options{display:flex;gap:14px;justify-content:center;margin-bottom:12px}
    .compare-btn{width:72px;height:72px;border-radius:50%;border:3px solid var(--purple-light);background:var(--white);font-size:32px;font-weight:800;color:var(--purple);cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1),background .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .compare-btn:hover{transform:scale(1.08);background:var(--purple-light)}.compare-btn:active{transform:scale(.95)}
    .compare-btn.correct{background:#c8f7c5;border-color:var(--green)}.compare-btn.wrong{background:#fdd;border-color:var(--red);opacity:.5}

    /* True/False */
    .tf-display{font-size:80px;margin-bottom:8px;line-height:1}
    .tf-word{font-size:32px;font-weight:800;color:var(--purple);margin-bottom:20px}
    .tf-options{display:flex;gap:16px;justify-content:center;margin-bottom:12px}
    .tf-btn{width:90px;height:72px;border-radius:18px;border:3px solid var(--purple-light);background:var(--white);font-size:36px;cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1),background .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .tf-btn:hover{transform:scale(1.06)}.tf-btn:active{transform:scale(.95)}
    .tf-btn.correct{background:#c8f7c5;border-color:var(--green)}.tf-btn.wrong{background:#fdd;border-color:var(--red);opacity:.5}

    /* Syllables */
    .syl-emoji{font-size:70px;margin-bottom:8px;line-height:1}
    .syl-target{font-size:32px;font-weight:800;color:var(--purple);margin-bottom:16px;min-height:40px;letter-spacing:.04em}
    .syl-options{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:12px}
    .syl-btn{padding:12px 20px;border-radius:14px;border:3px solid var(--purple-light);background:var(--white);font-family:'Nunito',sans-serif;font-size:22px;font-weight:800;color:var(--purple);cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1),background .15s,border-color .15s,opacity .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .syl-btn:hover{transform:scale(1.04);border-color:var(--purple)}.syl-btn:active{transform:scale(.95)}
    .syl-btn.used{opacity:.3;pointer-events:none}.syl-btn.wrong-flash{background:#fdd;border-color:var(--red)}

    /* Match */
    .match-grid{display:grid;grid-template-columns:auto auto;gap:10px;justify-content:center;align-items:center;margin-bottom:12px}
    .match-item{padding:10px 16px;border-radius:14px;border:3px solid var(--purple-light);background:var(--white);font-size:18px;font-weight:700;color:var(--purple);cursor:pointer;text-align:center;min-width:90px;transition:transform .15s,background .15s,border-color .15s,opacity .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .match-item.emoji{font-size:42px;padding:6px 14px}
    .match-item:hover{transform:scale(1.03)}
    .match-item.selected{border-color:var(--purple);background:var(--purple-light)}
    .match-item.matched{border-color:var(--green);background:#c8f7c5;opacity:.5;pointer-events:none}

    /* SelectAll */
    .selectall-target{font-size:56px;font-weight:900;color:var(--purple);margin-bottom:16px}
    .selectall-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;max-width:320px;margin-left:auto;margin-right:auto}
    .selectall-card{padding:14px 10px;border-radius:14px;border:3px solid var(--purple-light);background:var(--white);font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;color:var(--purple);cursor:pointer;text-align:center;transition:transform .15s,background .15s,border-color .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
    .selectall-card:hover{transform:scale(1.03)}.selectall-card:active{transform:scale(.97)}
    .selectall-card.selected{background:var(--purple-light);border-color:var(--purple)}
    .selectall-card.correct{background:#c8f7c5;border-color:var(--green);color:#2e7d32}
    .selectall-card.wrong{background:#fdd;border-color:var(--red);color:#c62828}

    /* Numline */
    .numline-problem{font-size:42px;font-weight:800;color:var(--purple);margin-bottom:20px}
    .numline-problem .answer-box{display:inline-flex;align-items:center;justify-content:center;min-width:48px;height:48px;border-radius:10px;background:var(--purple-light);color:var(--purple);margin-left:4px}
    .numline-wrap{position:relative;width:100%;max-width:360px;margin:0 auto 10px;padding:28px 18px 44px}
    .numline-track{width:100%;height:5px;background:var(--purple-light);border-radius:100px;position:relative}
    .numline-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:13px;font-weight:700;color:var(--purple-mid)}
    .numline-ticks{display:flex;justify-content:space-between;position:absolute;top:-4px;left:0;right:0;pointer-events:none}
    .numline-tick{width:2px;height:12px;background:var(--purple-light);border-radius:2px}
    .numline-thumb{width:36px;height:36px;border-radius:50%;background:var(--purple);position:absolute;top:-16px;left:0;cursor:grab;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:14px;box-shadow:0 3px 10px rgba(61,45,121,.25);touch-action:none;user-select:none;-webkit-user-select:none}
    .numline-thumb:active{cursor:grabbing;background:var(--purple-mid)}
    .numline-thumb.correct-pos{background:var(--green)}.numline-thumb.wrong-pos{background:var(--red)}

    /* Reading: sentence→picture */
    .read-sentence{font-size:22px;font-weight:700;color:var(--text);margin-bottom:20px;line-height:1.5;padding:12px 16px;background:var(--purple-light);border-radius:14px}
    .read-options{display:flex;gap:12px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
    .read-opt{font-size:56px;padding:10px 16px;border-radius:18px;border:3px solid var(--purple-light);background:var(--white);cursor:pointer;transition:transform .15s,background .15s,border-color .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .read-opt:hover{transform:scale(1.06)}.read-opt:active{transform:scale(.95)}
    .read-opt.correct{background:#c8f7c5;border-color:var(--green)}.read-opt.wrong{background:#fdd;border-color:var(--red);opacity:.5}

    /* Reading: fill word */
    .fill-sentence{font-size:20px;font-weight:700;color:var(--text);margin-bottom:20px;line-height:1.5}
    .fill-blank{display:inline-block;min-width:80px;border-bottom:3px solid var(--pink);color:var(--pink);font-weight:800;margin:0 4px}
    .fill-options{display:flex;gap:10px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
    .fill-btn{padding:10px 20px;border-radius:14px;border:3px solid var(--purple-light);background:var(--white);font-family:'Nunito',sans-serif;font-size:18px;font-weight:700;color:var(--purple);cursor:pointer;transition:transform .15s,background .15s,border-color .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .fill-btn:hover{transform:scale(1.04)}.fill-btn:active{transform:scale(.95)}
    .fill-btn.correct{background:#c8f7c5;border-color:var(--green);color:#2e7d32}
    .fill-btn.wrong{background:#fdd;border-color:var(--red);color:#c62828;opacity:.5}

    /* Reading: order words */
    .order-result{font-size:22px;font-weight:800;color:var(--purple);margin-bottom:16px;min-height:36px;padding:10px;background:var(--purple-light);border-radius:14px;letter-spacing:.02em}
    .order-options{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
    .order-btn{padding:10px 18px;border-radius:14px;border:3px solid var(--purple-light);background:var(--white);font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;color:var(--purple);cursor:pointer;transition:transform .15s,background .15s,border-color .15s,opacity .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .order-btn:hover{transform:scale(1.04)}.order-btn:active{transform:scale(.95)}
    .order-btn.used{opacity:.3;pointer-events:none}
    .order-btn.wrong-flash{background:#fdd;border-color:var(--red)}

    /* Speaker */
    .speaker-btn{width:90px;height:90px;border-radius:50%;border:3px solid var(--purple-light);background:var(--white);font-size:42px;cursor:pointer;margin-bottom:16px;transition:transform .2s,border-color .2s;-webkit-tap-highlight-color:transparent}
    .speaker-btn:hover{transform:scale(1.06);border-color:var(--purple)}.speaker-btn:active{transform:scale(.95)}
    .speaker-btn.playing{border-color:var(--purple);animation:pring 1s ease-in-out infinite}
    @keyframes pring{0%,100%{box-shadow:0 0 0 0 rgba(61,45,121,.2)}50%{box-shadow:0 0 0 14px rgba(61,45,121,0)}}

    .btn-check{background:var(--purple);color:var(--white);padding:12px 32px;border-radius:100px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;cursor:pointer;border:none;margin-top:6px;transition:transform .15s,opacity .15s;-webkit-tap-highlight-color:transparent}
    .btn-check:hover{transform:scale(1.03)}.btn-check:active{transform:scale(.97)}.btn-check:disabled{opacity:.4;pointer-events:none}

    /* Feedback */
    .feedback{font-size:22px;font-weight:800;min-height:36px;margin:10px 0}
    .feedback.success{color:var(--green)}.feedback.error{color:var(--red)}
    .btn-skip{background:none;border:2px solid var(--purple-light);color:var(--purple-mid);padding:8px 20px;border-radius:100px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .btn-skip:hover{opacity:.7}

    /* Progress */
    .progress-wrap{width:100%;max-width:650px;margin-bottom:12px}
    .progress-bar{width:100%;height:8px;background:var(--purple-light);border-radius:100px;overflow:hidden}
    .progress-fill{height:100%;background:var(--purple);border-radius:100px;transition:width .4s cubic-bezier(.34,1.56,.64,1)}
    .progress-text{font-size:13px;font-weight:700;color:var(--purple-mid);margin-top:3px;text-align:right}

    /* Result */
    .result p{font-size:18px;margin-bottom:14px}
    .result .stars{font-size:44px;margin-bottom:14px;letter-spacing:6px}

    /* Chest animation */

// ============================================================
function generateLevelRounds(levelDef){
  const rounds=[];const types=levelDef.types;
  for(let i=0;i<ROUNDS_PER_LEVEL;i++){
    const t=types[i%types.length];
    rounds.push(generateRound(t));
  }
  return shuffle(rounds);
}

function generateRound(type){
  const short=PW.filter(p=>p.w.length<=3),medium=PW.filter(p=>p.w.length<=5),long=PW.filter(p=>p.w.length>=5);
  const shortD=DW.filter(w=>w.length<=3),longD=DW.filter(w=>w.length>=5);

  switch(type){
    case 'picture_easy': return{type:'picture',data:pick(short.length?short:PW,1)[0]};
    case 'picture_medium': return{type:'picture',data:pick(medium.length?medium:PW,1)[0]};
    case 'picture_hard': return{type:'picture',data:pick(long.length?long:PW,1)[0]};
    case 'trueFalse': case 'trueFalse_hard': return{type:'trueFalse',data:genTF()};
    case 'match': return{type:'match',data:genMatch()};
    case 'syllable': return{type:'syllable',data:SYL[randInt(0,SYL.length-1)]};
    case 'math_add': return{type:'math',data:genMath(0,0,5)};
    case 'math_sub': return{type:'math',data:genMath(1,1,5)};
    case 'math_mix': return{type:'math',data:genMath(randInt(0,4))};
    case 'selectAll': return{type:'selectAll',data:genSelectAll()};
    case 'compare': return{type:'compare',data:genCompare()};
    case 'numline': return{type:'numline',data:genNumline()};
    case 'dictation_easy': return{type:'dictation',data:{word:pick(shortD.length?shortD:DW,1)[0]}};
    case 'dictation_hard': return{type:'dictation',data:{word:pick(longD.length?longD:DW,1)[0]}};
    case 'readSentence': return{type:'readSentence',data:READ_SENTENCES[randInt(0,READ_SENTENCES.length-1)]};
    case 'fillWord': return{type:'fillWord',data:FILL_SENTENCES[randInt(0,FILL_SENTENCES.length-1)]};
    case 'orderWords': return{type:'orderWords',data:ORDER_SENTENCES[randInt(0,ORDER_SENTENCES.length-1)]};
    case '_mix_easy': return generateRound(['picture_easy','math_add','trueFalse','syllable','readSentence','dictation_easy'][randInt(0,5)]);
    case '_mix_medium': return generateRound(['picture_medium','math_mix','match','fillWord','selectAll','compare','orderWords'][randInt(0,6)]);
    case '_mix_hard': return generateRound(['picture_hard','math_mix','numline','dictation_hard','readSentence','fillWord','orderWords','selectAll'][randInt(0,7)]);
    default: return{type:'trueFalse',data:genTF()};
  }
}

function genMath(pt,minA,maxA){
  pt=pt??randInt(0,4);minA=minA??0;maxA=maxA??10;let a,b,answer,display;
  switch(pt){
    case 0:a=randInt(minA,maxA-1);b=randInt(0,maxA-a);answer=a+b;display=`${a} + ${b} = <span class="blank">?</span>`;break;
    case 1:a=randInt(Math.max(1,minA),maxA);b=randInt(0,a);answer=a-b;display=`${a} \u{2212} ${b} = <span class="blank">?</span>`;break;
    case 2:{const r=randInt(1,maxA);b=randInt(0,r);answer=r-b;display=`<span class="blank">?</span> + ${b} = ${r}`;break;}
    case 3:{const r=randInt(1,maxA);a=randInt(0,r);answer=r-a;display=`${a} + <span class="blank">?</span> = ${r}`;break;}
    case 4:a=randInt(Math.max(1,minA),maxA);const r2=randInt(0,a);answer=a-r2;display=`${a} \u{2212} <span class="blank">?</span> = ${r2}`;break;
  }
  const opts=new Set([answer]);while(opts.size<4){let w=answer+randInt(-3,3);if(w<0||w>10)w=randInt(0,10);opts.add(w);}
  return{display,answer,options:shuffle([...opts])};
}
function genMatch(){return{pairs:pick(PW,3).map(i=>({emoji:i.e,word:i.w}))};}
function genTF(){const item=PW[randInt(0,PW.length-1)];const ok=Math.random()>.4;let sw=item.w;if(!ok){let o;do{o=PW[randInt(0,PW.length-1)];}while(o.w===item.w);sw=o.w;}return{emoji:item.e,word:sw,correct:ok};}
function genCompare(){const a=randInt(0,10),b=randInt(0,10);return{a,b,answer:a>b?'>':a<b?'<':'='};}
function genSelectAll(){const target=randInt(2,10);const cards=[];const used=new Set();let cc=randInt(2,3);for(let i=0;i<cc;i++){let a,b,ex;do{a=randInt(0,target);b=target-a;ex=`${a} + ${b}`;}while(used.has(ex));used.add(ex);cards.push({expr:ex,correct:true});}while(cards.length<4){let a,b,v,ex;do{a=randInt(0,10);b=randInt(0,10-a);v=a+b;ex=`${a} + ${b}`;}while(v===target||used.has(ex));used.add(ex);cards.push({expr:ex,correct:false});}return{target,cards:shuffle(cards)};}
function genNumline(){const isAdd=Math.random()>.4;let a,b,answer,display;if(isAdd){a=randInt(1,8);b=randInt(1,10-a);answer=a+b;display=`${a} + ${b} = `;}else{a=randInt(2,10);b=randInt(1,a);answer=a-b;display=`${a} \u{2212} ${b} = `;}return{display,answer};}

function renderMap(){
  const d=loadData();
  // Streak
  const today=new Date().toISOString().slice(0,10),yest=new Date(Date.now()-864e5).toISOString().slice(0,10);
  const sa=d.streak.lastDate===today||d.streak.lastDate===yest;
  if(sa&&d.streak.count>0){$('navStreak').style.display='flex';$('navStreak').textContent='\u{1F525} '+d.streak.count;}else $('navStreak').style.display='none';

  // Stats
  const st=$('mapStats');
  if(d.stats.gamesPlayed>0)st.innerHTML=`<div class="stat-b"><div class="v">${d.stats.gamesPlayed}</div><div class="l">Hier</div></div><div class="stat-b"><div class="v">${d.stats.totalCorrect}</div><div class="l">Správnych</div></div>`;
  else st.innerHTML='';

  // Badges
  const br=$('badgeRow');
  br.innerHTML=BADGES.map(b=>{
    const earned=d.badges&&d.badges.includes(b.id);
    return `<div class="badge-item"><div class="badge-icon${earned?'':' locked'}">${b.icon}</div><div class="badge-name">${b.name}</div></div>`;
  }).join('');

  // Map
  const map=$('levelMap');map.innerHTML='';
  let levelIdx=0,chestIdx=0;
  LEVELS.forEach((lvl,i)=>{
    if(lvl==='_chest'){
      // Chest
      const opened=d.chestsOpened[chestIdx]||false;
      const unlocked=levelIdx>0&&getLevelStars(d,levelIdx-1)>=1;
      const node=document.createElement('div');
      const ci=chestIdx;
      node.innerHTML=`<div class="level-line${levelIdx>0&&getLevelStars(d,levelIdx-1)>=1?' done':''}"></div><div class="chest-node"><div class="chest-icon${!unlocked?' locked':''}">${opened?'\u{1F381}':'\u{1F4E6}'}</div><div class="chest-label">${opened?'Otvorená':'Truhlica'}</div></div><div class="level-line"></div>`;
      if(unlocked&&!opened){
        node.querySelector('.chest-node').addEventListener('click',()=>openChest(ci));
      }
      map.appendChild(node);
      chestIdx++;
    }else{
      const li=levelIdx;
      const stars=getLevelStars(d,li);
      const unlocked=isLevelUnlocked(d,li);
      const done=stars>0;
      const isCurrent=unlocked&&!done;

      const node=document.createElement('div');
      if(levelIdx>0||i>0)node.innerHTML=`<div class="level-line${done?' done':''}"></div>`;

      const circleClass=done?'done':isCurrent?'current':'locked';
      const inner=done?lvl.icon:isCurrent?lvl.icon:'\u{1F512}';
      let starsHTML='';
      for(let s=0;s<3;s++)starsHTML+=`<span class="${s<stars?'on':'off'}">\u{2B50}</span>`;

      node.innerHTML+=`<div class="level-node" data-level="${li}"><div class="level-circle ${circleClass}">${inner}</div><div class="level-name">${lvl.name}</div>${done?`<div class="level-stars">${starsHTML}</div>`:''}</div>`;

      if(unlocked){
        node.querySelector('.level-node').addEventListener('click',()=>startLevel(li));
      }
      map.appendChild(node);
      levelIdx++;
    }
  });

  // Scroll to current level
  setTimeout(()=>{const cur=map.querySelector('.level-circle.current');if(cur)cur.scrollIntoView({behavior:'smooth',block:'center'});},200);
}

function openChest(chestIdx){
  const d=loadData();
  if(d.chestsOpened[chestIdx])return;
  d.chestsOpened[chestIdx]=true;
  const badge=BADGES[chestIdx];
  if(badge&&!d.badges.includes(badge.id))d.badges.push(badge.id);
  saveData(d);
  playSound('win');

  const ov=document.createElement('div');
  ov.className='chest-overlay';
  ov.innerHTML=`<div class="chest-big">\u{1F381}</div><div style="margin-top:20px;text-align:center;animation:bpop .5s cubic-bezier(.34,1.56,.64,1) .3s both"><div style="font-size:64px">${badge?badge.icon:'\u{2B50}'}</div><div style="font-size:22px;font-weight:800;color:white;margin-top:8px">${badge?badge.name:'Odznak'}</div><div style="font-size:16px;color:rgba(255,255,255,.8);margin-top:4px">${badge?badge.desc:''}</div></div>`;
  ov.addEventListener('click',()=>{ov.remove();renderMap();});
  document.body.appendChild(ov);
  launchConfetti();
}

function startLevel(levelIdx){
  currentLevelIdx=levelIdx;
  const levelDefs=LEVELS.filter(l=>l!=='_chest');
  const def=levelDefs[levelIdx];
  totalScore=0;roundIndex=0;wrongRounds=[];retryMode=false;
  $('totalScore').textContent='0';$('navScore').style.display='flex';
  roundsData=generateLevelRounds(def);
  showScreen('gameScreen');

}

function loadRound(){
  answered=false;typedChars=[];currentRound=roundsData[roundIndex];
  const total=roundsData.length;
  $('progressFill').style.width=((roundIndex/total)*100)+'%';
  $('progressText').textContent=retryMode?`Opakujem ${roundIndex-ROUNDS_PER_LEVEL+1}`:`${roundIndex+1} / ${ROUNDS_PER_LEVEL}`;
  ALL_CONTENT_IDS.forEach(id=>$(id).style.display='none');
  $('feedback').textContent='';$('feedback').className='feedback';
  $('nextBtn').style.display='none';$('skipBtn').style.display='inline-block';
  mascotReact('breathe');

  const loaders={picture:loadPicture,math:loadMath,dictation:loadDictation,syllable:loadSyllable,match:loadMatch,trueFalse:loadTF,compare:loadCompare,selectAll:loadSelectAll,numline:loadNumline,readSentence:loadReadSentence,fillWord:loadFillWord,orderWords:loadOrderWords};
  loaders[currentRound.type]();
}

function loadCompare(){const d=currentRound.data;$('gameTypeLabel').textContent='\u{1F522} Porovnaj';$('gameTitle').textContent='Čo je správne?';$('gameInstruction').textContent='Vyber správny znak.';$('compareDisplay').innerHTML=`${d.a} <span class="circle">?</span> ${d.b}`;$('compareContent').style.display='block';let att=0;const c=$('compareOptions');c.innerHTML='';['<','=','>'].forEach(s=>{const btn=document.createElement('button');btn.className='compare-btn';btn.textContent=s;btn.addEventListener('click',()=>{playSound('click');if(answered)return;if(s===d.answer){btn.classList.add('correct');onCorrect();}else{btn.classList.add('wrong');btn.disabled=true;att++;if(att>=1)onWrongFinal();else onWrongFeedback();}});c.appendChild(btn);});}
function loadSelectAll(){const d=currentRound.data;$('gameTypeLabel').textContent='\u{2705} Vyber všetky';$('gameTitle').textContent='Vyber všetky správne!';$('gameInstruction').textContent='Ktoré príklady sa rovnajú číslu?';$('selectAllTarget').textContent=d.target;$('selectAllContent').style.display='block';$('selectAllCheck').disabled=true;const sel=new Set();const g=$('selectAllGrid');g.innerHTML='';d.cards.forEach((card,i)=>{const el=document.createElement('div');el.className='selectall-card';el.textContent=card.expr;el.addEventListener('click',()=>{if(answered)return;playSound('click');if(sel.has(i)){sel.delete(i);el.classList.remove('selected');}else{sel.add(i);el.classList.add('selected');}$('selectAllCheck').disabled=sel.size===0;});g.appendChild(el);});$('selectAllCheck').onclick=()=>{if(answered)return;const cards=g.querySelectorAll('.selectall-card');let ok=true;d.cards.forEach((card,i)=>{const isSel=sel.has(i);if(card.correct&&isSel)cards[i].classList.add('correct');else if(card.correct&&!isSel){cards[i].classList.add('correct');ok=false;}else if(!card.correct&&isSel){cards[i].classList.add('wrong');ok=false;}});if(ok)onCorrect();else onWrongFinal();};}
function loadNumline(){const d=currentRound.data;$('gameTypeLabel').textContent='\u{1F4CF} Číselná os';$('gameTitle').textContent='Označ na osi!';$('gameInstruction').textContent='Posuň bodku na správne číslo.';$('numlineProblem').innerHTML=d.display+'<span class="answer-box" id="numlineAnswer">?</span>';$('numlineContent').style.display='block';const track=$('numlineTrack'),thumb=$('numlineThumb');thumb.className='numline-thumb';thumb.textContent='0';thumb.style.left='0px';const ticks=$('numlineTicks');ticks.innerHTML='';for(let i=0;i<=10;i++){const t=document.createElement('div');t.className='numline-tick';ticks.appendChild(t);}let cv=0;function ut(cx){const r=track.getBoundingClientRect();let p=(cx-r.left)/r.width;p=Math.max(0,Math.min(1,p));cv=Math.round(p*10);thumb.style.left=`calc(${cv/10*100}% - 18px)`;thumb.textContent=cv;$('numlineAnswer').textContent=cv;}thumb.addEventListener('mousedown',e=>{e.preventDefault();const mv=e2=>ut(e2.clientX);const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);});thumb.addEventListener('touchstart',e=>{e.preventDefault();const mv=e2=>ut(e2.touches[0].clientX);const end=()=>{document.removeEventListener('touchmove',mv);document.removeEventListener('touchend',end);};document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',end);});track.addEventListener('click',e=>{if(!answered)ut(e.clientX);});$('numlineCheck').onclick=()=>{if(answered)return;if(cv===d.answer){thumb.classList.add('correct-pos');onCorrect();}else{thumb.classList.add('wrong-pos');setTimeout(()=>thumb.classList.remove('wrong-pos'),500);onWrongFinal();}};}

// NEW READING LOADERS
function loadReadSentence(){const d=currentRound.data;$('gameTypeLabel').textContent='\u{1F4D6} Čítanie';$('gameTitle').textContent='Prečítaj vetu';$('gameInstruction').textContent='Ktorý obrázok patrí k vete?';$('readSentence').textContent=d.sentence;$('readSentenceContent').style.display='block';const c=$('readOptions');c.innerHTML='';shuffle(d.options).forEach(emoji=>{const btn=document.createElement('div');btn.className='read-opt';btn.textContent=emoji;btn.addEventListener('click',()=>{playSound('click');if(answered)return;if(emoji===d.correct){btn.classList.add('correct');onCorrect();}else{btn.classList.add('wrong');onWrongFinal();}});c.appendChild(btn);});}

function loadFillWord(){const d=currentRound.data;$('gameTypeLabel').textContent='\u{270D}\u{FE0F} Doplň slovo';$('gameTitle').textContent='Doplň chýbajúce slovo';$('gameInstruction').textContent='Ktoré slovo patrí do vety?';$('fillSentence').innerHTML=d.sentence.replace('___',`<span class="fill-blank">___</span>`);$('fillWordContent').style.display='block';const c=$('fillOptions');c.innerHTML='';shuffle(d.options).forEach(opt=>{const btn=document.createElement('button');btn.className='fill-btn';btn.textContent=opt;btn.addEventListener('click',()=>{playSound('click');if(answered)return;if(opt===d.blank){btn.classList.add('correct');document.querySelector('.fill-blank').textContent=opt;onCorrect();}else{btn.classList.add('wrong');btn.disabled=true;onWrongFinal();}});c.appendChild(btn);});}

function loadOrderWords(){const d=currentRound.data;$('gameTypeLabel').textContent='\u{1F4DD} Zoraď slová';$('gameTitle').textContent='Vytvor vetu!';$('gameInstruction').textContent='Ťukaj na slová v správnom poradí.';$('orderResult').textContent='';$('orderWordsContent').style.display='block';let built=[],err=0;const c=$('orderOptions');c.innerHTML='';shuffle(d.words).forEach(word=>{const btn=document.createElement('button');btn.className='order-btn';btn.textContent=word;btn.addEventListener('click',()=>{playSound('click');if(answered)return;if(word===d.words[built.length]){built.push(word);btn.classList.add('used');$('orderResult').textContent=built.join(' ');if(built.length===d.words.length)onCorrect();}else{btn.classList.add('wrong-flash');err++;if(err>=2)onWrongFinal();else onWrongFeedback();setTimeout(()=>btn.classList.remove('wrong-flash'),500);}});c.appendChild(btn);});}

$('speakerBtn').addEventListener('click',()=>{if(currentRound?.type==='dictation')speak(currentRound.data.word);});

// ============================================================
// CORRECT / WRONG
// ============================================================
function getCorrectAnswer(){const r=currentRound;if(r.type==='math')return r.data.answer;if(r.type==='compare')return r.data.answer;if(r.type==='trueFalse')return r.data.correct?'\u{2705} Áno':'\u{274C} Nie';if(r.type==='syllable')return r.data.w||r.data.word;if(r.type==='match')return'';if(r.type==='selectAll')return r.data.target;if(r.type==='numline')return r.data.answer;if(r.type==='readSentence')return r.data.correct;if(r.type==='fillWord')return r.data.blank;if(r.type==='orderWords')return r.data.correct;return r.data.word||r.data.w||'';}

function onCorrect(){answered=true;totalScore++;$('totalScore').textContent=totalScore;$('feedback').textContent='\u{1F389} Výborne, Sárka!';$('feedback').className='feedback success';$('nextBtn').style.display='inline-block';$('skipBtn').style.display='none';if(activeInput)activeInput.blur();playSound('correct');mascotReact('correct');launchConfetti();}
function onWrongFinal(){answered=true;if(activeInput)activeInput.blur();$('skipBtn').style.display='none';const a=getCorrectAnswer();$('feedback').innerHTML=a?`\u{274C} Správna odpoveď: <strong>${a}</strong>`:'\u{274C} Chybička!';$('feedback').className='feedback error';$('nextBtn').style.display='inline-block';playSound('wrong');mascotReact('wrong');if(!currentRound._retried)wrongRounds.push(JSON.parse(JSON.stringify(currentRound)));}
function onWrongFeedback(){$('feedback').textContent='\u{274C} Skús to znova!';$('feedback').className='feedback error';playSound('wrong');mascotReact('wrong');}

$('skipBtn').addEventListener('click',()=>{answered=true;$('skipBtn').style.display='none';if(activeInput)activeInput.blur();const a=getCorrectAnswer();$('feedback').innerHTML=a?`\u{1F4A1} Správna odpoveď: <strong>${a}</strong>`:'\u{1F4A1} Preskočené';$('feedback').className='feedback error';$('nextBtn').style.display='inline-block';if(!currentRound._retried)wrongRounds.push(JSON.parse(JSON.stringify(currentRound)));});

$('nextBtn').addEventListener('click',()=>{roundIndex++;if(roundIndex>=roundsData.length){if(wrongRounds.length>0&&!retryMode){retryMode=true;wrongRounds.forEach(r=>r._retried=true);roundsData=roundsData.concat(wrongRounds);wrongRounds=[];loadRound();}else showResult();}else{loadRound();if(activeInput)activeInput.focus();}});

function showResult(){
  showScreen('resultScreen');
  const pct=totalScore/ROUNDS_PER_LEVEL;
  let stars=pct===1?3:pct>=.75?2:pct>=.5?1:0;
  $('resultStars').textContent='\u{2B50}'.repeat(stars)+'\u{2606}'.repeat(3-stars);
  $('resultText').textContent=`Správne: ${totalScore} z ${ROUNDS_PER_LEVEL}`;

  // Save
  const d=loadData();
  const prev=d.levels[currentLevelIdx]?.stars||0;
  if(stars>prev){if(!d.levels[currentLevelIdx])d.levels[currentLevelIdx]={};d.levels[currentLevelIdx].stars=stars;}
  d.stats.gamesPlayed++;d.stats.totalCorrect+=totalScore;
  if(totalScore>d.stats.bestScore)d.stats.bestScore=totalScore;
  updateStreak(d);
  saveData(d);

  // Mascot msg on result only
  if(pct>=.75){$('resMascot').src='2.png';$('resMascot').className='m-img happy';$('resName').textContent='Lili';$('resMsg').textContent=pct===1?'Perfektné, Sárka!':'Skvelá práca!';}
  else if(pct>=.5){$('resMascot').src='1.png';$('resMascot').className='m-img breathe';$('resName').textContent='Moli';$('resMsg').textContent='Dobrá práca!';}
  else{$('resMascot').src='2.png';$('resMascot').className='m-img breathe';$('resName').textContent='Lili';$('resMsg').textContent='Nevadí, skúsime znova!';}

  if(pct>=.75)playSound('win');
}

$('backToMapBtn').addEventListener('click',()=>{showScreen('mapScreen');renderMap();});

// INIT
renderMap();
</script>
