<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Sárkina Hra</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#3d2d79;--pmid:#6b5ba7;--plight:#e0dcf0;--cream:#fff6f0;--white:#fff;--text:#2e455d;--green:#4caf50;--red:#e57373;--pink:#e85d75;--gold:#ffd700;
--forest:#2d6a4f;--river:#1d3557;--mountain:#b08968}
body{font-family:'Nunito',sans-serif;color:var(--text);background:var(--cream);-webkit-font-smoothing:antialiased;min-height:100dvh;overflow-x:hidden}
canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:200}

/* BG animals */
.bgA{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bgA div{position:absolute;pointer-events:none}
.bgA img{width:100%;height:100%;object-fit:contain}
.bgA .b1{top:3%;left:2%;width:110px;opacity:.11;animation:fl 18s ease-in-out infinite}
.bgA .b2{top:15%;right:3%;width:90px;opacity:.08;animation:fl 22s ease-in-out infinite 2s}
.bgA .b3{top:50%;left:5%;width:120px;opacity:.10;animation:fl 20s ease-in-out infinite 4s}
.bgA .b4{top:75%;right:5%;width:100px;opacity:.09;animation:fl 16s ease-in-out infinite 1s}
@keyframes fl{0%,100%{transform:translate(0,0)}25%{transform:translate(15px,-25px) rotate(4deg)}50%{transform:translate(-10px,-40px)}75%{transform:translate(20px,-15px) rotate(-3deg)}}

.wrap{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column}
nav{display:flex;align-items:center;justify-content:center;padding:12px 16px;gap:14px}
.logo{font-size:24px;font-weight:900;color:var(--purple);font-style:italic}
.streak{display:flex;align-items:center;gap:3px;background:linear-gradient(135deg,#ff9800,#ff5722);color:#fff;padding:4px 10px;border-radius:100px;font-weight:800;font-size:12px}
.score-pill{display:flex;align-items:center;gap:4px;background:var(--plight);padding:5px 12px;border-radius:100px;font-weight:700;font-size:13px;color:var(--purple)}
.screen{display:none;flex:1;flex-direction:column;align-items:center;padding:12px;text-align:center;overflow-y:auto}
.screen.active{display:flex}

/* Mascot chat */
.mc{display:flex;align-items:flex-end;gap:8px;max-width:360px;width:100%;margin-bottom:12px}
.mc img{width:80px;flex-shrink:0;filter:drop-shadow(0 3px 8px rgba(61,45,121,.1))}
.mc .bub{background:var(--white);border:2px solid var(--plight);border-radius:16px;padding:10px 14px;font-size:15px;font-weight:700;line-height:1.35;text-align:left;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.04);animation:pop .3s cubic-bezier(.34,1.56,.64,1)}
.mc .bub::after{content:'';position:absolute;bottom:14px;left:-8px;border:4px solid transparent;border-right:8px solid var(--white)}
.mc .bub .nm{font-size:10px;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px;display:block}
@keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}

/* INTRO SLIDES */
.intro-slide{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px;text-align:center;max-width:480px;margin:0 auto}
.intro-slide .intro-emoji{font-size:120px;margin-bottom:24px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
.intro-slide .intro-img{width:160px;margin-bottom:20px;filter:drop-shadow(0 8px 20px rgba(61,45,121,.15));animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
.intro-slide h2{font-size:36px;font-weight:900;color:var(--purple);margin-bottom:14px;line-height:1.15}
.intro-slide p{font-size:22px;line-height:1.55;color:var(--text);margin-bottom:28px}
.intro-slide p .s1{color:var(--purple);font-weight:800}
.intro-slide p .s2{color:var(--pink);font-weight:800}
.intro-slide p .s3{color:var(--forest);font-weight:800}
.intro-dots{display:flex;gap:10px;margin-bottom:24px}
.intro-dot{width:12px;height:12px;border-radius:50%;background:var(--plight);transition:all .2s}
.intro-dot.active{background:var(--purple);transform:scale(1.3)}

@media(max-width:768px){
  .intro-slide h2{font-size:30px}
  .intro-slide p{font-size:20px}
  .intro-slide .intro-img{width:130px}
  .intro-slide .intro-emoji{font-size:90px}
}
@media(max-width:400px){
  .intro-slide h2{font-size:26px}
  .intro-slide p{font-size:18px}
  .intro-slide .intro-img{width:110px}
}

/* WORLD CARDS (namiesto tabs) */
.world-cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:420px;margin-bottom:16px}
.world-card{border-radius:20px;padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden}
.world-card:hover{transform:scale(1.02);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.world-card:active{transform:scale(.98)}
.world-card.locked{opacity:.45;cursor:default;filter:grayscale(.5)}
.world-card.locked:hover{transform:none;box-shadow:none}
.world-card .wc-icon{font-size:44px;flex-shrink:0}
.world-card .wc-info{flex:1;text-align:left}
.world-card .wc-name{font-size:18px;font-weight:900;color:var(--white)}
.world-card .wc-desc{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);margin-top:2px}
.world-card .wc-progress{display:flex;gap:4px;margin-top:6px}
.world-card .wc-pip{width:28px;height:6px;border-radius:100px;background:rgba(255,255,255,.25)}
.world-card .wc-pip.filled{background:rgba(255,255,255,.8)}
.world-card .wc-mascot{width:50px;height:auto;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
.world-card.w0c{background:linear-gradient(135deg,#2d6a4f,#40916c)}
.world-card.w1c{background:linear-gradient(135deg,#1d3557,#457b9d)}
.world-card.w2c{background:linear-gradient(135deg,#b08968,#dda15e)}
.world-card .wc-lock{position:absolute;right:16px;font-size:24px;opacity:.6}

/* SVG Map */
.map-container{width:100%;max-width:440px;margin-bottom:16px;position:relative;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.map-container img{width:100%;display:block}
.map-fog{position:absolute;top:0;height:100%;background:rgba(80,80,80,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:opacity .8s ease;display:flex;align-items:center;justify-content:center;font-size:28px;color:rgba(255,255,255,.4)}
.map-fog.revealed{opacity:0;pointer-events:none}
.map-fog:nth-child(2){left:0;width:25%}
.map-fog:nth-child(3){left:25%;width:25%}
.map-fog:nth-child(4){left:50%;width:25%}
.map-fog:nth-child(5){left:75%;width:25%}
.map-label{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;color:var(--white);background:rgba(0,0,0,.35);padding:3px 10px;border-radius:100px;white-space:nowrap}

.back-btn{background:none;border:none;font-size:24px;cursor:pointer;padding:8px;color:var(--purple);-webkit-tap-highlight-color:transparent;align-self:flex-start;margin-bottom:8px}

/* Level nodes */
.level-list{display:flex;flex-direction:column;align-items:center;gap:0;width:100%;max-width:360px}
.lv-node{display:flex;flex-direction:column;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s}
.lv-node:hover{transform:scale(1.04)}.lv-node:active{transform:scale(.97)}
.lv-circ{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(--white);box-shadow:0 3px 8px rgba(0,0,0,.1)}
.lv-circ.done{background:var(--green)}.lv-circ.cur{background:var(--purple);animation:pls 2s ease-in-out infinite}.lv-circ.lock{background:#bbb;cursor:default}
@keyframes pls{0%,100%{box-shadow:0 0 0 0 rgba(61,45,121,.25)}50%{box-shadow:0 0 0 10px rgba(61,45,121,0)}}
.lv-name{font-size:12px;font-weight:700;margin-top:4px;max-width:110px;text-align:center;color:var(--text)}
.lv-stars{display:flex;gap:1px;margin-top:2px;font-size:14px}
.lv-stars .on{color:var(--gold)}.lv-stars .off{color:#ddd}
.lv-line{width:2px;height:22px;background:var(--plight);margin:0 auto}
.lv-line.done{background:var(--green)}

/* Chest node */
.ch-node{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .12s;-webkit-tap-highlight-color:transparent}
.ch-node:hover{transform:scale(1.06)}
.ch-icon{font-size:40px}.ch-icon.off{filter:grayscale(1) opacity(.35)}
.ch-lbl{font-size:11px;font-weight:700;color:var(--pmid);margin-top:2px}

/* Chest overlay */
.chest-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px;cursor:pointer}
.chest-ov .big{font-size:100px;animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
.chest-ov .story{max-width:340px;background:var(--white);border-radius:20px;padding:20px;margin-top:16px;font-size:17px;font-weight:700;line-height:1.4;color:var(--text);animation:pop .5s cubic-bezier(.34,1.56,.64,1) .2s both;text-align:center}
.chest-ov .clue{font-size:36px;margin-bottom:8px;display:block}

/* Finale */
.finale{max-width:400px}
.finale h2{font-size:32px;font-weight:900;color:var(--purple);margin:12px 0 8px}
.finale p{font-size:17px;line-height:1.5;margin-bottom:12px}
.finale .chars{font-size:80px;margin:16px 0}

/* GAME */
.gc{background:var(--white);border-radius:24px;padding:24px 18px;width:100%;max-width:600px;box-shadow:0 3px 10px rgba(61,45,121,.04),0 10px 30px rgba(61,45,121,.03);text-align:center}
.gt-label{display:inline-block;background:var(--plight);color:var(--purple);font-size:12px;font-weight:700;padding:4px 12px;border-radius:100px;margin-bottom:10px}
.gt-title{font-size:20px;font-weight:800;color:var(--purple);margin-bottom:4px}
.gt-instr{font-size:15px;color:var(--text);margin-bottom:18px;line-height:1.4}

.pic-d{font-size:90px;margin-bottom:14px;min-height:100px;line-height:1}
.tw{position:relative;cursor:text;margin-bottom:10px}
.tw input{position:absolute;inset:0;opacity:0;font-size:36px;border:none;background:none;-webkit-appearance:none;touch-action:manipulation;z-index:2}
.td{font-size:36px;font-weight:800;color:var(--purple);letter-spacing:.08em;min-height:44px;display:flex;align-items:center;justify-content:center;gap:2px}
.td .ch{display:inline-flex;align-items:center;justify-content:center;width:36px;height:44px;border-bottom:3px solid var(--plight);transition:border-color .15s}
.td .ch.filled{border-color:var(--purple)}.td .ch.cursor{border-color:var(--pink);animation:bk 1s step-end infinite}
@keyframes bk{50%{border-color:transparent}}

.md{font-size:40px;font-weight:800;color:var(--purple);margin-bottom:18px;min-height:50px}
.md .bl{display:inline-flex;align-items:center;justify-content:center;min-width:46px;height:50px;border-bottom:3px solid var(--pink);color:var(--pink);margin:0 2px}
.mo{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px}
.mob{width:62px;height:62px;border-radius:16px;border:2px solid var(--plight);background:var(--white);font-family:'Nunito',sans-serif;font-size:26px;font-weight:800;color:var(--purple);cursor:pointer;transition:transform .12s cubic-bezier(.34,1.56,.64,1),background .12s,border-color .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.mob:hover{transform:scale(1.06);border-color:var(--purple);background:var(--plight)}.mob:active{transform:scale(.95)}
.mob.ok{background:#c8f7c5;border-color:var(--green);color:#2e7d32}.mob.no{background:#fdd;border-color:var(--red);color:#c62828;opacity:.5}

.cmpd{font-size:44px;font-weight:800;color:var(--purple);margin-bottom:18px}
.cmpd .ci{display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:50%;border:3px solid var(--pink);color:var(--pink);margin:0 5px;font-size:28px}
.cmpo{display:flex;gap:12px;justify-content:center;margin-bottom:10px}
.cmpb{width:64px;height:64px;border-radius:50%;border:2px solid var(--plight);background:var(--white);font-size:28px;font-weight:800;color:var(--purple);cursor:pointer;transition:transform .12s cubic-bezier(.34,1.56,.64,1),background .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.cmpb:hover{transform:scale(1.06);background:var(--plight)}.cmpb:active{transform:scale(.95)}
.cmpb.ok{background:#c8f7c5;border-color:var(--green)}.cmpb.no{background:#fdd;border-color:var(--red);opacity:.5}

.tfd{font-size:72px;margin-bottom:6px;line-height:1}
.tfw{font-size:28px;font-weight:800;color:var(--purple);margin-bottom:16px}
.tfo{display:flex;gap:14px;justify-content:center;margin-bottom:10px}
.tfb{width:80px;height:64px;border-radius:16px;border:2px solid var(--plight);background:var(--white);font-size:32px;cursor:pointer;transition:transform .12s cubic-bezier(.34,1.56,.64,1),background .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tfb:hover{transform:scale(1.06)}.tfb:active{transform:scale(.95)}
.tfb.ok{background:#c8f7c5;border-color:var(--green)}.tfb.no{background:#fdd;border-color:var(--red);opacity:.5}

.sye{font-size:64px;margin-bottom:6px;line-height:1}
.syt{font-size:28px;font-weight:800;color:var(--purple);margin-bottom:14px;min-height:36px}
.syo{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px}
.syb{padding:10px 18px;border-radius:12px;border:2px solid var(--plight);background:var(--white);font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;color:var(--purple);cursor:pointer;transition:transform .12s cubic-bezier(.34,1.56,.64,1),background .12s,border-color .12s,opacity .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.syb:hover{transform:scale(1.04);border-color:var(--purple)}.syb:active{transform:scale(.95)}
.syb.used{opacity:.3;pointer-events:none}.syb.wf{background:#fdd;border-color:var(--red)}

.mg{display:grid;grid-template-columns:auto auto;gap:8px;justify-content:center;align-items:center;margin-bottom:10px}
.mi{padding:8px 14px;border-radius:12px;border:2px solid var(--plight);background:var(--white);font-size:16px;font-weight:700;color:var(--purple);cursor:pointer;text-align:center;min-width:80px;transition:transform .12s,background .12s,border-color .12s,opacity .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.mi.emo{font-size:36px;padding:4px 12px}
.mi:hover{transform:scale(1.03)}
.mi.sel{border-color:var(--purple);background:var(--plight)}
.mi.mtd{border-color:var(--green);background:#c8f7c5;opacity:.5;pointer-events:none}

.sat{font-size:50px;font-weight:900;color:var(--purple);margin-bottom:14px}
.sag{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;max-width:300px;margin-left:auto;margin-right:auto}
.sac{padding:12px 8px;border-radius:12px;border:2px solid var(--plight);background:var(--white);font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;color:var(--purple);cursor:pointer;text-align:center;transition:transform .12s,background .12s,border-color .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
.sac:hover{transform:scale(1.03)}.sac:active{transform:scale(.97)}
.sac.sel{background:var(--plight);border-color:var(--purple)}.sac.ok{background:#c8f7c5;border-color:var(--green);color:#2e7d32}.sac.no{background:#fdd;border-color:var(--red);color:#c62828}

.nlp{font-size:38px;font-weight:800;color:var(--purple);margin-bottom:18px}
.nlp .ab{display:inline-flex;align-items:center;justify-content:center;min-width:42px;height:42px;border-radius:8px;background:var(--plight);color:var(--purple);margin-left:3px}
.nlw{position:relative;width:100%;max-width:340px;margin:0 auto 8px;padding:24px 16px 40px}
.nlt{width:100%;height:4px;background:var(--plight);border-radius:100px;position:relative}
.nlti{display:flex;justify-content:space-between;position:absolute;top:-3px;left:0;right:0;pointer-events:none}
.nltk{width:2px;height:10px;background:var(--plight);border-radius:2px}
.nlth{width:32px;height:32px;border-radius:50%;background:var(--purple);position:absolute;top:-14px;left:0;cursor:grab;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:13px;box-shadow:0 2px 8px rgba(61,45,121,.2);touch-action:none;user-select:none}
.nlth:active{cursor:grabbing;background:var(--pmid)}.nlth.gp{background:var(--green)}.nlth.bp{background:var(--red)}
.nll{display:flex;justify-content:space-between;margin-top:5px;font-size:12px;font-weight:700;color:var(--pmid)}

.rs{font-size:20px;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.4;padding:10px 14px;background:var(--plight);border-radius:12px}
.ro{display:flex;gap:10px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.roi{font-size:50px;padding:8px 14px;border-radius:16px;border:2px solid var(--plight);background:var(--white);cursor:pointer;transition:transform .12s,background .12s,border-color .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.roi:hover{transform:scale(1.05)}.roi:active{transform:scale(.95)}.roi.ok{background:#c8f7c5;border-color:var(--green)}.roi.no{background:#fdd;border-color:var(--red);opacity:.5}

.fs{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.4}
.fbl{display:inline-block;min-width:70px;border-bottom:2px solid var(--pink);color:var(--pink);font-weight:800;margin:0 3px}
.flo{display:flex;gap:8px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.flb{padding:8px 16px;border-radius:12px;border:2px solid var(--plight);background:var(--white);font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:var(--purple);cursor:pointer;transition:transform .12s,background .12s,border-color .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.flb:hover{transform:scale(1.03)}.flb:active{transform:scale(.95)}.flb.ok{background:#c8f7c5;border-color:var(--green);color:#2e7d32}.flb.no{background:#fdd;border-color:var(--red);color:#c62828;opacity:.5}

.orr{font-size:20px;font-weight:800;color:var(--purple);margin-bottom:12px;min-height:32px;padding:8px;background:var(--plight);border-radius:12px}
.oro{display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.orb{padding:8px 14px;border-radius:12px;border:2px solid var(--plight);background:var(--white);font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:var(--purple);cursor:pointer;transition:transform .12s,background .12s,border-color .12s,opacity .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.orb:hover{transform:scale(1.03)}.orb:active{transform:scale(.95)}.orb.used{opacity:.3;pointer-events:none}.orb.wf{background:#fdd;border-color:var(--red)}

.spk{width:80px;height:80px;border-radius:50%;border:3px solid var(--plight);background:var(--white);font-size:38px;cursor:pointer;margin-bottom:14px;transition:transform .2s,border-color .2s;-webkit-tap-highlight-color:transparent}
.spk:hover{transform:scale(1.06);border-color:var(--purple)}.spk:active{transform:scale(.95)}.spk.playing{border-color:var(--purple);animation:pr 1s ease-in-out infinite}
@keyframes pr{0%,100%{box-shadow:0 0 0 0 rgba(61,45,121,.2)}50%{box-shadow:0 0 0 12px rgba(61,45,121,0)}}

.ckb{background:var(--purple);color:var(--white);padding:10px 28px;border-radius:100px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;border:none;margin-top:4px;transition:transform .12s,opacity .12s;-webkit-tap-highlight-color:transparent}
.ckb:hover{transform:scale(1.03)}.ckb:active{transform:scale(.97)}.ckb:disabled{opacity:.35;pointer-events:none}

.fb{font-size:20px;font-weight:800;min-height:32px;margin:8px 0}.fb.ok{color:var(--green)}.fb.er{color:var(--red)}
.skb{background:none;border:2px solid var(--plight);color:var(--pmid);padding:7px 18px;border-radius:100px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.skb:hover{opacity:.7}
.btn{border:none;border-radius:100px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;transition:transform .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:hover{transform:scale(1.03)}.btn:active{transform:scale(.97)}
.btn-b{background:var(--purple);color:var(--white);padding:18px 48px;font-size:22px;border-radius:100px}

function ps(t){try{const c=ga();if(c.state==='suspended')c.resume();if(t==='ok'){[523.25,659.25,783.99].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.1,c.currentTime+i*.1);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.1+.25);o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.1);o.stop(c.currentTime+i*.1+.25);});}else if(t==='no'){const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=200;o.frequency.exponentialRampToValueAtTime(150,c.currentTime+.2);g.gain.setValueAtTime(.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.2);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.2);}else if(t==='cl'){const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=800;g.gain.setValueAtTime(.04,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.05);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.05);}else if(t==='win'){[523.25,659.25,783.99,1046.5].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.1,c.currentTime+i*.12);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.12+.35);o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.12);o.stop(c.currentTime+i*.12+.35);});}}catch(e){}}

// CONFETTI
const cc=document.getElementById('confetti'),cx=cc.getContext('2d');let cp=[],ca=null;
function conf(){cc.width=innerWidth;cc.height=innerHeight;cp=[];const cs=['#3d2d79','#e0dcf0','#ff9800','#4caf50','#e85d75','#ffd700'];for(let i=0;i<50;i++)cp.push({x:Math.random()*cc.width,y:-10-Math.random()*60,w:ri(4,9),h:ri(3,6),color:cs[0|Math.random()*cs.length],vx:(Math.random()-.5)*3,vy:ri(3,5),rot:Math.random()*360,rv:(Math.random()-.5)*7});if(ca)cancelAnimationFrame(ca);acf();setTimeout(()=>{cancelAnimationFrame(ca);cx.clearRect(0,0,cc.width,cc.height);},1600);}
function acf(){cx.clearRect(0,0,cc.width,cc.height);cp.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.vy+=.07;cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot*Math.PI/180);cx.fillStyle=p.color;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();});ca=requestAnimationFrame(acf);}

// TTS
let skV=null;
function initV(){
  if(!('speechSynthesis' in window))return;
  const v=speechSynthesis.getVoices();
  if(!v.length)return;
  skV=v.find(x=>x.lang==='sk-SK'&&/microsoft|google/i.test(x.name))
    ||v.find(x=>x.lang==='sk-SK')
    ||v.find(x=>x.lang&&x.lang.startsWith('sk'))
    ||v.find(x=>x.lang==='cs-CZ')
    ||v.find(x=>x.lang&&x.lang.startsWith('cs'))
    ||null;
  console.log('TTS hlas:',skV?skV.name+' ['+skV.lang+']':'žiadny');
}
if('speechSynthesis' in window){initV();speechSynthesis.onvoiceschanged=initV;}

function spk(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const btn=$('spkBtn');
  if(btn)btn.classList.add('playing');
  const w=text.toLowerCase();

  const u1=new SpeechSynthesisUtterance(w);
  if(skV){u1.voice=skV;u1.lang=skV.lang;}else{u1.lang='sk-SK';}
  u1.rate=0.65;u1.pitch=1.05;u1.volume=1;

  u1.onend=()=>{
    // Zopakuj pomalšie
    setTimeout(()=>{
      const u2=new SpeechSynthesisUtterance(w);
      if(skV){u2.voice=skV;u2.lang=skV.lang;}else{u2.lang='sk-SK';}
      u2.rate=0.5;u2.pitch=1.05;u2.volume=1;
      u2.onend=()=>{if(btn)btn.classList.remove('playing');};
      u2.onerror=()=>{if(btn)btn.classList.remove('playing');};
      window.speechSynthesis.speak(u2);
    },500);
  };
  u1.onerror=()=>{if(btn)btn.classList.remove('playing');};
  window.speechSynthesis.speak(u1);
}

function renderWorldDetail(worldIdx){
  if(worldIdx===undefined)worldIdx=curW;
  curW=worldIdx;
  const d=ld();
  const w=WORLDS[worldIdx];
  $('wTitle').textContent=w.icon+' '+w.name;
  $('wTitle').style.color=worldIdx===0?'#2d6a4f':worldIdx===1?'#1d3557':'#b08968';
  $('wSub').textContent=worldIdx===0?'Stella hľadá vlčiatko Lukáša':worldIdx===1?'Lili hľadá srnčiatko Nellu':'Stella a Lili spoja sily!';

  // SVG Map with fog
  const mp=$('mapPcs');mp.innerHTML='';
  const container=document.createElement('div');
  container.className='map-container';
  const img=document.createElement('img');
  img.src=w.mapSvg;img.alt=w.name;
  container.appendChild(img);
  const revealed=d.worlds[worldIdx].mp;
  const total=revealed.length;
  for(let i=0;i<total;i++){
    const fog=document.createElement('div');
    fog.className='map-fog'+(revealed[i]?' revealed':'');
    fog.textContent=revealed[i]?'':'\u{2753}';
    container.appendChild(fog);
  }
  const partsRevealed=revealed.filter(Boolean).length;
  const label=document.createElement('div');
  label.className='map-label';
  label.textContent=`Mapa: ${partsRevealed} / ${total}`;
  container.appendChild(label);
  mp.appendChild(container);

  // Levels
  const list=$('lvList');list.innerHTML='';
  let levelIdx=0,chestIdx=0;
  w.levels.forEach((lv,i)=>{
    if(typeof lv==='string'&&lv.startsWith('_chest')){
      // Chest
      const parts=lv.split('|');
      const ci=chestIdx;
      const opened=d.worlds[worldIdx].mp[ci]||false;
      const prevLvDone=levelIdx>0&&lvStars(d,worldIdx,levelIdx-1)>=1;
      const canOpen=prevLvDone&&!opened;

      const line1=document.createElement('div');
      line1.className='lv-line'+(prevLvDone?' done':'');
      list.appendChild(line1);

      const node=document.createElement('div');
      node.className='ch-node';
      node.innerHTML='<div class="ch-icon'+(canOpen?'':opened?'':' off')+'">'+(opened?'\u{1F381}':'\u{1F4E6}')+'</div><div class="ch-lbl">'+(opened?'Otvorená':'Truhlica')+'</div>';
      if(canOpen)node.addEventListener('click',()=>openChest(worldIdx,ci,parts));
      list.appendChild(node);

      const line2=document.createElement('div');
      line2.className='lv-line';
      list.appendChild(line2);
      chestIdx++;
    }else{
      const li=levelIdx;
      const stars=lvStars(d,worldIdx,li);
      const unlocked=lvUnlocked(d,worldIdx,li);
      const done=stars>0;
      const isCur=unlocked&&!done;

      if(i>0){const ln=document.createElement('div');ln.className='lv-line'+(done?' done':'');list.appendChild(ln);}

      const node=document.createElement('div');
      node.className='lv-node';
      const cls=done?'done':isCur?'cur':'lock';
      const inner=done?lv.name.charAt(0).toUpperCase():isCur?'\u{25B6}':'\u{1F512}';
      let stH='';for(let s=0;s<3;s++)stH+='<span class="'+(s<stars?'on':'off')+'">\u{2B50}</span>';
      node.innerHTML='<div class="lv-circ '+cls+'">'+inner+'</div><div class="lv-name">'+lv.name+'</div>'+(done?'<div class="lv-stars">'+stH+'</div>':'');
      if(unlocked)node.addEventListener('click',()=>startLevel(worldIdx,li));
      list.appendChild(node);
      levelIdx++;
    }
  });

  // Scroll to current
  setTimeout(()=>{const c=list.querySelector('.lv-circ.cur');if(c)c.scrollIntoView({behavior:'smooth',block:'center'});},200);
}

function openChest(wi,ci,parts){
  const d=ld();
  if(d.worlds[wi].mp[ci])return;
  d.worlds[wi].mp[ci]=true;
  sv(d);ps('win');

  // Check if finale
  if(parts[1]==='FINALE'){
    d.done=true;sv(d);
    showFinale();
    return;
  }

  const ov=document.createElement('div');
  ov.className='chest-ov';
  ov.innerHTML='<div class="big">\u{1F381}</div><div class="story"><span class="clue">'+parts[2]+'</span>'+parts[3]+'<br><br><em>'+parts[1]+'</em></div>';
  ov.addEventListener('click',()=>{ov.remove();ss('worldScr');renderWorldDetail(wi);});
  document.body.appendChild(ov);
  conf();
}

function showFinale(){
  ss('finScr');
  $('finMsg').innerHTML='Lukáš a Nella čakali na kopci pri ohníku.<br><br>Stella: "Lukáš! Konečne!"<br>Lili: "Nella, moja malá!"<br><br>Nella: "Mama, my sme sa nestratili! My sme vám hľadali poklad!"<br><br><strong>Ďakujeme, Sárka! Bez teba by sme ich nenašli!</strong>';
  conf();ps('win');
}

$('storyGo').addEventListener('click',()=>{
  // Init audio context from user gesture (needed for TTS on tablets)
  try{ga();if(actx&&actx.state==='suspended')actx.resume();}catch(e){}

function genRounds(types){
  const r=[];
  for(let i=0;i<RPL;i++)r.push(genRound(types[i%types.length]));
  return sh(r);
}

function genRound(type){
  const short=PW.filter(p=>p.w.length<=3),med=PW.filter(p=>p.w.length<=5),long=PW.filter(p=>p.w.length>=5);
  const shortD=DW.filter(w=>w.length<=3),longD=DW.filter(w=>w.length>=5);
  switch(type){
    case 'picture_easy':return{type:'picture',data:pk(short.length?short:PW,1)[0]};
    case 'picture_medium':return{type:'picture',data:pk(med.length?med:PW,1)[0]};
    case 'picture_hard':return{type:'picture',data:pk(long.length?long:PW,1)[0]};
    case 'trueFalse':case 'trueFalse_hard':return{type:'trueFalse',data:gTF()};
    case 'match':return{type:'match',data:gMa()};
    case 'syllable':return{type:'syllable',data:SYL[ri(0,SYL.length-1)]};
    case 'math_add':return{type:'math',data:gMt(0,0,5)};
    case 'math_sub':return{type:'math',data:gMt(1,1,5)};
    case 'math_mix':return{type:'math',data:gMt(ri(0,4))};
    case 'selectAll':return{type:'selectAll',data:gSA()};
    case 'compare':return{type:'compare',data:gCm()};
    case 'numline':return{type:'numline',data:gNL()};
    case 'dictation_easy':return{type:'dictation',data:{word:pk(shortD.length?shortD:DW,1)[0]}};
    case 'dictation_hard':return{type:'dictation',data:{word:pk(longD.length?longD:DW,1)[0]}};
    case 'readSentence':return{type:'readSentence',data:RSENT[ri(0,RSENT.length-1)]};
    case 'fillWord':return{type:'fillWord',data:FSENT[ri(0,FSENT.length-1)]};
    case 'orderWords':return{type:'orderWords',data:OSENT[ri(0,OSENT.length-1)]};
    case '_mix_easy':return genRound(['picture_easy','math_add','trueFalse','syllable','readSentence','dictation_easy'][ri(0,5)]);
    case '_mix_medium':return genRound(['picture_medium','math_mix','match','fillWord','selectAll','compare','orderWords'][ri(0,6)]);
    case '_mix_hard':return genRound(['picture_hard','math_mix','numline','dictation_hard','readSentence','fillWord','orderWords','selectAll'][ri(0,7)]);
    default:return{type:'trueFalse',data:gTF()};
  }
}

function gMt(pt,mn,mx){pt=pt??ri(0,4);mn=mn??0;mx=mx??10;let a,b,answer,display;
switch(pt){case 0:a=ri(mn,mx-1);b=ri(0,mx-a);answer=a+b;display=`${a} + ${b} = <span class="bl">?</span>`;break;case 1:a=ri(Math.max(1,mn),mx);b=ri(0,a);answer=a-b;display=`${a} \u{2212} ${b} = <span class="bl">?</span>`;break;case 2:{const r=ri(1,mx);b=ri(0,r);answer=r-b;display=`<span class="bl">?</span> + ${b} = ${r}`;break;}case 3:{const r=ri(1,mx);a=ri(0,r);answer=r-a;display=`${a} + <span class="bl">?</span> = ${r}`;break;}case 4:a=ri(Math.max(1,mn),mx);const r2=ri(0,a);answer=a-r2;display=`${a} \u{2212} <span class="bl">?</span> = ${r2}`;break;}
const opts=new Set([answer]);while(opts.size<4){let w=answer+ri(-3,3);if(w<0||w>10)w=ri(0,10);opts.add(w);}return{display,answer,options:sh([...opts])};}
function gMa(){return{pairs:pk(PW,3).map(i=>({emoji:i.e,word:i.w}))};}
function gTF(){const item=PW[ri(0,PW.length-1)];const ok=Math.random()>.4;let sw=item.w;if(!ok){let o;do{o=PW[ri(0,PW.length-1)];}while(o.w===item.w);sw=o.w;}return{emoji:item.e,word:sw,correct:ok};}
function gCm(){const a=ri(0,10),b=ri(0,10);return{a,b,answer:a>b?'>':a<b?'<':'='};}
function gSA(){const target=ri(2,10);const cards=[];const used=new Set();let cc=ri(2,3);for(let i=0;i<cc;i++){let a,b,ex;do{a=ri(0,target);b=target-a;ex=`${a} + ${b}`;}while(used.has(ex));used.add(ex);cards.push({expr:ex,correct:true});}while(cards.length<4){let a,b,v,ex;do{a=ri(0,10);b=ri(0,10-a);v=a+b;ex=`${a} + ${b}`;}while(v===target||used.has(ex));used.add(ex);cards.push({expr:ex,correct:false});}return{target,cards:sh(cards)};}
function gNL(){const isAdd=Math.random()>.4;let a,b,answer,display;if(isAdd){a=ri(1,8);b=ri(1,10-a);answer=a+b;display=`${a} + ${b} = `;}else{a=ri(2,10);b=ri(1,a);answer=a-b;display=`${a} \u{2212} ${b} = `;}return{display,answer};}

// OK / WRONG
function getAns(){const r=cur;if(r.type==='math')return r.data.answer;if(r.type==='compare')return r.data.answer;if(r.type==='trueFalse')return r.data.correct?'Áno':'Nie';if(r.type==='syllable')return r.data.w;if(r.type==='selectAll')return r.data.target;if(r.type==='numline')return r.data.answer;if(r.type==='readSentence')return r.data.c;if(r.type==='fillWord')return r.data.b;if(r.type==='orderWords')return r.data.c;if(r.type==='match')return'';return r.data.w||r.data.word||'';}
function onOk(){ans=true;score++;$('scrV').textContent=score;$('fb').textContent='\u{1F389} Výborne!';$('fb').className='fb ok';$('nxB').style.display='inline-block';$('skB').style.display='none';if(aInp)aInp.blur();ps('ok');conf();}
function onBad(){ans=true;if(aInp)aInp.blur();$('skB').style.display='none';const a=getAns();$('fb').innerHTML=a?'\u{274C} Odpoveď: <strong>'+a+'</strong>':'\u{274C} Chybička!';$('fb').className='fb er';$('nxB').style.display='inline-block';ps('no');if(!cur._r)wrongs.push(JSON.parse(JSON.stringify(cur)));}
function onWF(){$('fb').textContent='\u{274C} Skús znova!';$('fb').className='fb er';ps('no');}

$('skB').addEventListener('click',()=>{ans=true;$('skB').style.display='none';if(aInp)aInp.blur();const a=getAns();$('fb').innerHTML=a?'\u{1F4A1} Odpoveď: <strong>'+a+'</strong>':'\u{1F4A1} Preskočené';$('fb').className='fb er';$('nxB').style.display='inline-block';if(!cur._r)wrongs.push(JSON.parse(JSON.stringify(cur)));});

$('nxB').addEventListener('click',()=>{rIdx++;if(rIdx>=rounds.length){if(wrongs.length>0&&!retry){retry=true;wrongs.forEach(r=>r._r=true);rounds=rounds.concat(wrongs);wrongs=[];loadRound();}else showRes();}else{loadRound();if(aInp)aInp.focus();}});

function showRes(){
  ss('resScr');
  const pct=score/RPL;
  let stars=pct===1?3:pct>=.75?2:pct>=.5?1:0;
  $('resStars').textContent='\u{2B50}'.repeat(stars)+'\u{2606}'.repeat(3-stars);
  $('resTxt').textContent=`Správne: ${score} z ${RPL}`;
  const w=WORLDS[curW];
  if(pct>=.75){$('resImg').src=w.mascot;$('resNm').textContent=w.mascotName;$('resMsg').textContent=pct===1?'Perfektné, Sárka!':'Skvelá práca!';}
  else if(pct>=.5){$('resImg').src=w.mascot;$('resNm').textContent=w.mascotName;$('resMsg').textContent='Dobrá práca!';}
  else{$('resImg').src=w.mascot;$('resNm').textContent=w.mascotName;$('resMsg').textContent='Nevadí, skúsime znova!';}
  const d=ld();
  const prev=d.worlds[curW].levels[curL]?.stars||0;
  if(stars>prev){if(!d.worlds[curW].levels[curL])d.worlds[curW].levels[curL]={};d.worlds[curW].levels[curL].stars=stars;}
  d.stats.g++;d.stats.t+=score;uStreak(d);sv(d);
  if(pct>=.75)ps('win');
}

let introIdx=0;
function showIntro(){
  const d=ld();
  // Skip intro if already played
  if(d.stats.g>0){ss('mapScr');renderWorldSelect();return;}
  ss('introScr');
  introIdx=0;
  renderIntroSlide();
}
function renderIntroSlide(){
  const s=INTRO_SLIDES[introIdx];
  const slide=$('introSlide');
  let html='';
  if(s.img){
    html+=`<img src="${s.img}" class="intro-img">`;
    if(s.img2)html+=`<img src="${s.img2}" class="intro-img" style="margin-top:-20px">`;
  }else if(s.emoji){
    html+=`<div class="intro-emoji">${s.emoji}</div>`;
  }
  html+=`<h2>${s.title}</h2><p>${s.text}</p>`;
  slide.innerHTML=html;

  // Dots
  const dots=$('introDots');dots.innerHTML='';
  INTRO_SLIDES.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='intro-dot'+(i===introIdx?' active':'');
    dots.appendChild(d);
  });

  $('introBtn').textContent=introIdx===INTRO_SLIDES.length-1?'Poďme hľadať!':'Ďalej';
}
$('introBtn').addEventListener('click',()=>{
  introIdx++;
  if(introIdx>=INTRO_SLIDES.length){ss('mapScr');renderWorldSelect();}
  else renderIntroSlide();
});

function renderWorldSelect(){
  const d=ld();
  // Streak
  const today=new Date().toISOString().slice(0,10),yest=new Date(Date.now()-864e5).toISOString().slice(0,10);
  const sa=d.streak.d===today||d.streak.d===yest;
  if(sa&&d.streak.c>0){$('stk').style.display='flex';$('stk').textContent='\u{1F525} '+d.streak.c;}else $('stk').style.display='none';

  // Mascot msg
  if(d.done)$('mapMsg').textContent='Všetci sú v bezpečí! Môžeš hrať znova.';
  else if(d.stats.g===0)$('mapMsg').textContent='Vyber si svet a poďme hľadať!';
  else $('mapMsg').textContent='Kam pôjdeme dnes, Sárka?';

  const cards=$('worldCards');cards.innerHTML='';
  WORLDS.forEach((w,i)=>{
    const unlocked=wUnlocked(d,i);
    const mp=d.worlds[i].mp;
    const done=mp[0]&&mp[1]&&mp[2];
    const lvsDone=d.worlds[i].levels.filter(l=>l&&l.stars>0).length;
    const lvsTotal=w.levels.filter(l=>typeof l!=='string').length;

    const card=document.createElement('div');
    card.className='world-card '+w.color+'c'+(unlocked?'':' locked');
    card.innerHTML=`
      <div class="wc-icon">${w.icon}</div>
      <div class="wc-info">
        <div class="wc-name">${w.name}</div>
        <div class="wc-desc">${done?'Hotové!':unlocked?w.mascotName+' hľadá...':'Zamknuté'}</div>
        <div class="wc-progress">${mp.map(p=>'<div class="wc-pip'+(p?' filled':'')+'"></div>').join('')}</div>
      </div>
      <img src="${w.mascot}" class="wc-mascot" alt="">
      ${unlocked?'':'<div class="wc-lock">\u{1F512}</div>'}
    `;
    if(unlocked)card.addEventListener('click',()=>{curW=i;ss('worldScr');renderWorldDetail(i);});
    cards.appendChild(card);
  });
}
